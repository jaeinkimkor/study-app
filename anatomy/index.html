function getFlashcardKey(card){return card.key||card.front;}
function countKnownCards(cards){
  return cards.filter(function(card){return fcState.known.has(getFlashcardKey(card));}).length;
}
function isIncompleteFlashQuestion(q){
  if(q.year>2020)return false;
  var emptyChoices=q.choices.filter(function(choice){return !choice||choice.trim().length<2;}).length;
  var shortQ=q.q.length<15;
  var garbageChoices=q.choices.some(function(choice){return choice&&(/정답 번|답 번|번 3|번 1/.test(choice));});
  return emptyChoices>=2||shortQ||garbageChoices;
}
function buildJjalgiFCCards(){
  return allQuestions.filter(function(q){return q.type==='짤기'&&!isExcludedQuestion(q);}).map(function(q){
    var explanation=(q.explanation||'').trim();
    if(explanation.length>320)explanation=explanation.substring(0,320)+'...';
    return {
      key:'jjalgi:'+q.id,
      kind:'jjalgi',
      unit:q.unit,
      year:q.year,
      question:q,
      front:q.q,
      choices:q.choices.slice(),
      answerIndex:q.answer,
      answerText:q.choices[q.answer]||'',
      explanation:explanation,
      warning:isIncompleteFlashQuestion(q)
    };
  });
}
function getActiveFCCards(){
  return fcState.mode==='jjalgi'?buildJjalgiFCCards():buildCoreFCCards();
}
function setFCMode(mode){
  fcState.mode=mode;
  $('fc-mode-core').classList.toggle('active',mode==='core');
  $('fc-mode-jjalgi').classList.toggle('active',mode==='jjalgi');
  $('fc-unit-filter').classList.toggle('hidden',mode==='jjalgi');
  $('fc-year-filter').classList.toggle('hidden',mode!=='jjalgi');
  $('fc-mode-note').textContent=mode==='jjalgi'
    ?'짤기 문제를 회상용 카드로 반복합니다. 앞면에서 답을 떠올리고, 이미지가 필요한 문제는 사진을 같이 봅니다.'
    :'핵심 개념을 빠르게 반복하는 카드 모드';
  initFC();
}
function renderCoreCardHTML(text, isFront){
  var html='<div class="fc-body" style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;">';
  var escaped=escapeHTML(text).replace(/\n/g,'<br>');
  if(isFront){
    html+='<div style="font-size:.68rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:16px;background:rgba(108,92,231,.08);padding:4px 12px;border-radius:20px;">RECALL</div>';
    html+='<div style="font-size:1.35rem;font-weight:800;line-height:1.7;color:var(--text);word-break:keep-all;text-align:center;">'+escaped+'</div>';
    html+='<div style="margin-top:24px;font-size:.75rem;color:var(--text3);">탭하여 정답 확인</div>';
  }else{
    var parts=escaped.split('<br>');
    var mainAnswer=parts[0]||'';
    var extra=parts.slice(1).join('<br>');
    html+='<div style="font-size:.68rem;font-weight:800;color:var(--success);text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px;">ANSWER</div>';
    html+='<div style="font-size:1.5rem;font-weight:800;line-height:1.5;color:var(--accent);margin-bottom:14px;text-align:center;">'+mainAnswer+'</div>';
    if(extra){
      html+='<div style="font-size:.92rem;line-height:1.7;color:var(--text2);border-top:2px solid rgba(108,92,231,.12);padding-top:14px;margin-top:6px;text-align:center;">'+extra+'</div>';
    }
  }
  html+='</div>';
  return html;
}
function renderJjalgiFrontHTML(card){
  var html='<div class="fc-body">';
  var verifyMeta=getVerificationMeta(card.question);
  html+='<div class="fc-card-meta">'+escapeHTML(card.year+' / '+card.unit+' / 짤기')+'</div>';
  if(card.warning)html+='<div class="fc-warning">OCR 주의</div>';
  if(verifyMeta)html+='<div class="fc-verify-flag '+verifyMeta.kind+'">'+escapeHTML(getVerificationBadgeText(verifyMeta))+'</div>';
  html+='<div class="fc-card-question">'+escapeHTML(card.front)+'</div>';
  html+='<div class="fc-image-wrap hidden" id="fc-front-image-wrap"></div>';
  html+='<div class="fc-choice-list">';
  card.choices.forEach(function(choice,index){
    html+='<div class="fc-choice-item">'+(index+1)+'. '+escapeHTML(choice||'')+'</div>';
  });
  html+='</div></div>';
  return html;
}
function renderJjalgiBackHTML(card){
  var html='<div class="fc-body">';
  var verifyMeta=getVerificationMeta(card.question);
  html+='<div class="fc-card-meta">'+escapeHTML(card.year+' / '+card.unit+' / 짤기')+'</div>';
  if(card.warning)html+='<div class="fc-warning">OCR 주의</div>';
  if(verifyMeta)html+='<div class="fc-verify-flag '+verifyMeta.kind+'">'+escapeHTML(getVerificationBadgeText(verifyMeta))+'</div>';
  html+='<div class="fc-answer-title">정답</div>';
  html+='<div class="fc-answer-main">'+(card.answerIndex+1)+'. '+escapeHTML(card.answerText)+'</div>';
  if(card.explanation){
    html+='<div class="fc-answer-expl"><strong>핵심 해설 / 암기 팁:</strong><br>'+escapeHTML(card.explanation).replace(/\n/g,'<br>')+'</div>';
  }
  html+=buildVerificationHTML(card.question);
  html+='</div>';
  return html;
}
function renderFCImages(card){
  var wrap=document.getElementById('fc-front-image-wrap');
  var token=++flashImageRenderToken;
  if(!wrap)return;
  wrap.innerHTML='';
  wrap.classList.add('hidden');
  if(card.kind!=='jjalgi'||!hasQuestionImage(card.question))return;
  wrap.classList.remove('hidden');
  wrap.innerHTML='<div class="fc-image-note">이미지 로딩 중...</div>';
  loadImagesForQuestion(card.question,function(data){
    if(token!==flashImageRenderToken)return;
    var currentCard=fcState.cards[fcState.current];
    if(!currentCard||getFlashcardKey(currentCard)!==getFlashcardKey(card))return;
    if(!data){wrap.innerHTML='<div class="fc-image-note">이미지를 불러오지 못했습니다.</div>';return;}
    var keys=resolveQuestionImageKeys(card.question,data);
    if(keys.length===0){
      wrap.innerHTML='<div class="fc-image-note">이 카드에 연결된 이미지를 찾지 못했습니다.</div>';
      return;
    }
    fillImageWrap(wrap,data,keys,'fc-inline-image');
  });
}
function initFC(){
  const allCards=getActiveFCCards();
  const unit=$('fc-unit-filter').value;
  const year=$('fc-year-filter').value;
  let cards=fcState.mode==='jjalgi'
    ?(year==='all'?allCards:allCards.filter(function(card){return card.year===parseInt(year,10);}))
    :(unit==='all'?allCards:allCards.filter(function(card){return card.unit===unit;}));
  if(fcState.unknownOnly){
    cards=cards.filter(function(c){return !fcState.known.has(getFlashcardKey(c));});
  }
  if(fcState.confusedOnly){
    var confFcList=getConfusedList('confused_fc');
    cards=cards.filter(function(c){return confFcList.indexOf(getFlashcardKey(c))>=0;});
  }
  fcState.cards=cards;
  fcState.current=0;
  renderFC();
}

function renderFC(){
  if(fcState.cards.length===0){
    $('fc-front').innerHTML='<div class="fc-body"><div class="fc-card-question">카드가 없습니다</div></div>';
    $('fc-back').innerHTML='';
    $('fc-counter').textContent='0 / 0';
    var fcCWrap=document.getElementById('fc-confused-wrap');
    if(fcCWrap)fcCWrap.innerHTML='';
    return;
  }
  const c=fcState.cards[fcState.current];
  if(c.kind==='jjalgi'){
    $('fc-front').innerHTML=renderJjalgiFrontHTML(c);
    $('fc-back').innerHTML=renderJjalgiBackHTML(c);
    renderFCImages(c);
  }else{
    $('fc-front').innerHTML=renderCoreCardHTML(c.front, true);
    $('fc-back').innerHTML=renderCoreCardHTML(c.back, false);
  }
  $('fc-card').classList.remove('flipped');
  $('fc-counter').textContent=(fcState.current+1)+' / '+fcState.cards.length+' (완료: '+countKnownCards(fcState.cards)+'장)';

  // Confused button for flashcard
  var fcCWrap=document.getElementById('fc-confused-wrap');
  if(!fcCWrap){
    fcCWrap=document.createElement('div');
    fcCWrap.id='fc-confused-wrap';
    fcCWrap.className='fc-confused-wrap';
    $('fc-card').parentNode.parentNode.insertBefore(fcCWrap,$('fc-card').parentNode);
  }
  var fcCActive=isConfused('confused_fc',getFlashcardKey(c));
  fcCWrap.innerHTML='<button class="confused-btn'+(fcCActive?' active':'')+'" id="fc-confused-btn" title="헷갈림 표시">&#9733;</button>';

  // Card height is now viewport-based with fixed bottom buttons
}

function flipFC(){$('fc-card').classList.toggle('flipped');}

function markFC(known){
  if(fcState.cards.length===0)return;
  var cardKey=getFlashcardKey(fcState.cards[fcState.current]);
  if(known)fcState.known.add(cardKey);
  else fcState.known.delete(cardKey);
  setConfusedList('fc_known',Array.from(fcState.known));
  if(fcState.current<fcState.cards.length-1){
    fcState.current++;
  } else {
    fcState.current=0;
  }
  renderFC();
}

$('fc-unit-filter').addEventListener('change',initFC);
$('fc-year-filter').addEventListener('change',initFC);

  fcState.unknownOnly=!fcState.unknownOnly;
  this.textContent=fcState.unknownOnly?'\uc804\uccb4 \uce74\ub4dc':'\ubaa8\ub974\ub294 \uce74\ub4dc\ub9cc';
  initFC();
});
$('fc-confused-only').addEventListener('click',function(){
  fcState.confusedOnly=!fcState.confusedOnly;
  this.textContent=fcState.confusedOnly?'\uc804\uccb4 \uce74\ub4dc':'\ud5f7\uac08\ub9ac\ub294 \uce74\ub4dc\ub9cc';
  if(fcState.confusedOnly){this.style.borderColor='var(--warning)';this.style.color='var(--warning)';}
  else{this.style.borderColor='';this.style.color='';}
  initFC();
});
$('fc-shuffle').addEventListener('click',function(){
  fcState.cards=shuffleArray(fcState.cards);
  fcState.current=0;
  renderFC();

// ========== STUDY MODE ==========
const studyUnits=["Upper Limb","Lower Limb","Back","\ud2b9\uc218\uac10\uac01\uae30","\ubc1c\uc0dd\ud559"];
let currentStudyUnit="Upper Limb";

function renderStudy(){
  // Chapter tabs
  const chapEl=$('study-chapters');
  chapEl.innerHTML='';
  studyUnits.forEach(u=>{
    const btn=document.createElement('button');
    btn.className='chapter-tab'+(u===currentStudyUnit?' active':'');
    btn.textContent=u;
    btn.onclick=()=>{currentStudyUnit=u;renderStudy();};
    chapEl.appendChild(btn);
  });

  const el=$('study-content');
  let html='';

  // Frequent topics
  const unitQs=allQuestions.filter(q=>q.unit===currentStudyUnit);
  const topicCount={};
  unitQs.forEach(q=>{
    const keys=extractTopics(q);
    keys.forEach(k=>{topicCount[k]=(topicCount[k]||0)+1;});
  });
  const sorted=Object.entries(topicCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  html+='<details class="study-section" open><summary>\uae30\ucd9c \ube48\ucd9c \ud1a0\ud53d ('+currentStudyUnit+')</summary><div class="study-section-body"><div class="card">';
  html+='<table class="topic-table"><thead><tr><th>\uc21c\uc704</th><th>\ud1a0\ud53d</th><th>\ucd9c\uc81c</th></tr></thead><tbody>';
  sorted.forEach(([topic,cnt],i)=>{
    const rank=i<3?'S':'A';
    html+='<tr><td><span class="rank-'+rank.toLowerCase()+'">'+rank+'</span></td><td>'+topic+'</td><td>'+cnt+'\ud68c</td></tr>';
  });
  html+='</tbody></table></div></div></details>';

  // Prof tips
  const tips=profTips.filter(t=>t.unit===currentStudyUnit);
  if(tips.length){
    html+='<details class="study-section"><summary>\uad50\uc218\ub2d8 \uac15\uc870 \ud3ec\uc778\ud2b8</summary><div class="study-section-body"><div class="card">';
    tips.forEach(t=>{
      html+='<div class="prof-bubble"><span class="importance '+t.importance+'">'+(t.importance==='critical'?'CRITICAL':'HIGH')+'</span><div class="topic">'+t.topic+'</div><div class="quote">"'+t.quote+'"</div></div>';
    });
    html+='</div></div></details>';
  }

  // Mnemonics
  const unitMn=mnemonics.filter(m=>m.unit===currentStudyUnit);
  if(unitMn.length){
    html+='<details class="study-section"><summary>Mnemonic (\ud074\ub9ad\uc73c\ub85c \ub4a4\uc9d1\uae30)</summary><div class="study-section-body"><div class="card"><div class="flash-grid">';
    unitMn.forEach(m=>{
      html+='<div class="flashcard"><div class="flashcard-inner"><div class="flashcard-front">'+m.front+'</div><div class="flashcard-back">'+m.back.replace(/\\n/g,'<br>')+'</div></div></div>';
    });
    html+='</div></div></div></details>';
  }

  // Fracture-nerve pairs
  if(currentStudyUnit==='Upper Limb'||currentStudyUnit==='Lower Limb'){
    const isUL=currentStudyUnit==='Upper Limb';
    const pairs=isUL?fractureNervePairs.slice(0,4):fractureNervePairs.slice(4);
    if(pairs.length){
      html+='<details class="study-section"><summary>\uace8\uc808-\uc2e0\uacbd \uc30d</summary><div class="study-section-body"><div class="card">';
      pairs.forEach(p=>{
        html+='<div class="frac-card"><div class="frac-info"><div class="frac-title">'+p.fracture+'</div><div class="frac-nerve">\u2192 '+p.nerve+'</div></div></div>';
      });
      html+='</div></div></details>';
    }
  }

  // Top 10 talgi predictions
  const talgis=unitQs.filter(q=>q.type==='\ud0c8\uae30'||q.type==='\uae30\ubcc0').slice(0,10);
  if(talgis.length){
    html+='<details class="study-section"><summary>\ud0c8\uae30 \uc608\uce21 TOP</summary><div class="study-section-body"><div class="card">';
    talgis.forEach(q=>{
      html+='<div class="lm-item"><span class="tag '+(q.type==='\ud0c8\uae30'?'s':'a')+'">'+q.type+'</span><strong>Q'+q.id+'.</strong> '+q.q.substring(0,60)+'... <span style="color:var(--success)">\u2192 '+q.choices[q.answer]+'</span></div>';
    });
    html+='</div></div></details>';
  }

  el.innerHTML=html;
}

function extractTopics(q){
  const topics=[];
  const text=q.q+' '+q.explanation;
  const keywords=['Radial n','Ulnar n','Median n','Axillary n','Musculocutaneous','Suprascapular','Thoracoacromial','Tibial n','Peroneal n','Femoral n','Obturator','Deltoid','Infraspinatus','Subscapularis','Supraspinatus','Biceps','Sartorius','Quadriceps','Adductor magnus','Carpal tunnel','Wrist drop','Winged scapula','Erb','Brachial plexus','Rotator cuff','meniscus','ACL','PCL','talofibular','Deltoid lig','dorsiflexion','plantarflexion','inversion','eversion','Rod','Cone','Saccule','Utricle','Tectorial','endolymph','Neural crest','Somitomere','pharyngeal arch','Achondroplasia','Polydactyly','Spina bifida','Piriformis','Semitendinosus'];
  keywords.forEach(k=>{if(text.toLowerCase().includes(k.toLowerCase()))topics.push(k);});
  if(topics.length===0)topics.push(q.choices[q.answer].split(' ')[0]);
  return topics;
}

// ========== FREQUENT QUESTIONS MODE ==========
function renderFreq(){
  var el=$('freq-content');
  // 정답 텍스트 정규화
  function normAns(text){return text.toLowerCase().replace(/[^a-z가-힣\s\.]/g,'').replace(/\s+/g,' ').trim();}
  // 정답별 그룹핑 (조직땡 제외)
  var nonTissue=allQuestions.filter(function(q){return q.unit!=='조직땡';});
  var groups={};
  nonTissue.forEach(function(q){
    var key=normAns(q.choices[q.answer]||'');
    if(key.length<4)return;
    if(!groups[key])groups[key]={answer:q.choices[q.answer],items:[],years:{}};
    groups[key].items.push(q);
    groups[key].years[q.year]=true;
  });
  // 2회 이상 + 최소 1회는 2021년 이후
  var repeated=[];
  for(var k in groups){
    var g=groups[k];
    if(g.items.length<2)continue;
    var hasRecent=g.items.some(function(q){return q.year>=2021;});
    if(!hasRecent)continue;
    repeated.push(g);
  }
  repeated.sort(function(a,b){return b.items.length-a.items.length;});

  var html='<div class="card"><div class="card-title">빈출 문제 모음 (2회 이상 출제)</div>';
  html+='<div style="color:var(--text2);font-size:.84rem;margin-bottom:14px;">같은 정답이 반복 출제된 문제를 모았습니다. 총 <strong>'+repeated.length+'개 유형</strong></div></div>';

  repeated.forEach(function(group,gi){
    var years=Object.keys(group.years).sort().join(', ');
    var count=group.items.length;
    var badge=count>=5?'danger':count>=3?'warning':'accent';
    html+='<details class="study-section"'+(gi<5?' open':'')+'>';
    html+='<summary><span style="color:var(--'+badge+');font-weight:800;margin-right:6px;">'+count+'회</span>';
    html+='<span style="flex:1">'+group.answer+'</span>';
    html+='<span style="font-size:.72rem;color:var(--text2);">'+years+'</span></summary>';
    html+='<div style="padding:12px;">';
    group.items.sort(function(a,b){return b.year-a.year;});
    group.items.forEach(function(q){
      html+='<div class="lm-item" style="margin-bottom:8px;">';
      html+='<span class="q-badge year" style="font-size:.68rem;margin-right:6px;">'+q.year+'</span>';
      html+='<span class="q-badge unit" style="font-size:.68rem;margin-right:6px;">'+q.unit+'</span>';
      html+='<strong>Q'+q.id+'.</strong> '+q.q.substring(0,70)+(q.q.length>70?'...':'');
      html+='<br><span style="color:var(--success);font-size:.82rem;">→ '+q.choices[q.answer]+'</span>';
      if(q.explanation){
        var exp=q.explanation.substring(0,100)+(q.explanation.length>100?'...':'');
        html+='<br><span style="color:var(--text2);font-size:.78rem;">'+exp+'</span>';
      }
      html+='</div>';
    });
    // 이 유형으로 퀴즈 시작 버튼
    html+='<button class="btn btn-sm btn-primary" style="margin-top:8px;width:100%;" data-freq-ids="'+group.items.map(function(q){return q.id;}).join(',')+'">이 유형 퀴즈 풀기 ('+count+'문제)</button>';
    html+='</div></details>';
  });

  el.innerHTML=html;

  // 빈출 퀴즈 버튼 이벤트
  el.addEventListener('click',function(e){
    var btn=e.target.closest('[data-freq-ids]');
    if(!btn)return;
    var ids=btn.getAttribute('data-freq-ids').split(',').map(Number);
    var qs=allQuestions.filter(function(q){return ids.indexOf(q.id)>=0;});
    if(qs.length>0){
      // Quiz 탭으로 전환 후 시작
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      document.querySelector('[data-tab="quiz"]').classList.add('active');
      ['quiz','freq','flash','study','review'].forEach(function(t){
        $('tab-'+t).classList.toggle('hidden',t!=='quiz');
      });
      startQuiz(qs);
    }
  });
}

function downloadAnki(){
  let csv='\ufeff"Front","Back","Tags"\n';
  mnemonics.forEach(m=>{
    const front=m.front.replace(/"/g,'""');
    const back=m.back.replace(/\\n/g,' | ').replace(/"/g,'""');
    csv+='"'+front+'","'+back+'","'+m.unit+'"\n';
  });
  sTopics.forEach(t=>{
    const tmp=document.createElement('div');tmp.innerHTML=t.text;
    const txt=(tmp.textContent||tmp.innerText).replace(/"/g,'""');
    const parts=txt.split('=');
    csv+='"'+(parts[0]||'').trim()+'","'+(parts.slice(1).join('=').trim()||txt)+'","S-topic"\n';
  });
  allQuestions.forEach(q=>{
    const front=q.q.replace(/"/g,'""');
    const back=q.choices[q.answer].replace(/"/g,'""');
    csv+='"'+front+'","'+back+'","'+q.unit+' '+q.year+'"\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  // iOS Safari compatible download
  if(navigator.share && typeof File !== 'undefined'){
    try{
      var file=new File([blob],'anatomy_anki.csv',{type:'text/csv;charset=utf-8'});
      navigator.share({files:[file],title:'Anki CSV'}).catch(function(){fallbackDownload(blob);});
    }catch(e){fallbackDownload(blob);}
  } else {
    fallbackDownload(blob);
  }
}
function fallbackDownload(blob){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='anatomy_anki.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
}

// ========== TOUCH SWIPE ==========
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',function(e){touchStartX=e.changedTouches[0].screenX;touchStartY=e.changedTouches[0].screenY;},{passive:true});
document.addEventListener('touchend',function(e){
  const diffX=touchStartX-e.changedTouches[0].screenX;
  const diffY=Math.abs(touchStartY-e.changedTouches[0].screenY);
  if(Math.abs(diffX)>60&&diffY<40){
    if(!$('quiz-area').classList.contains('hidden')){
      if(diffX>0)$('next-btn').click();
      else $('prev-btn').click();
    }
    if(!$('tab-flash').classList.contains('hidden')){
      if(diffX>0)markFC(true);
      else markFC(false);
    }
  }
},{passive:true});
