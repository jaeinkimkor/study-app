<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%ED%95%B4%EB%B6%80%ED%95%99%20%EC%98%AC%EC%9D%B8%EC%9B%90%22%2C%22short_name%22%3A%22ANAT%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f5f7%22%2C%22theme_color%22%3A%22%237c6cf0%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%5D%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%236c5ce7'/%3E%3Ctext x='90' y='120' text-anchor='middle' font-size='100' font-family='sans-serif' font-weight='bold' fill='%23ffffff'%3EA%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-title" content="ANAT">
<title>해부학 최종 올인원</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f5f5f7;--card:#ffffff;--border:#e0e0e6;--accent:#6c5ce7;--accent2:#7c6cf0;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--radius:10px;}
html{font-size:15px;}
@media(max-width:480px){html{font-size:14px;}}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;line-height:1.6;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
button:disabled{opacity:.4;cursor:not-allowed;}
input,select{font-family:inherit;}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(245,245,247,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 12px;}
.nav-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:4px;min-height:52px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-title{font-size:.82rem;font-weight:700;color:var(--accent);white-space:nowrap;margin-right:6px;}
.tab-btn{padding:7px 13px;border-radius:8px;background:transparent;color:var(--text2);font-size:.78rem;font-weight:600;transition:all .2s;min-height:40px;white-space:nowrap;flex-shrink:0;}
.tab-btn.active{background:var(--accent);color:#fff;}
/* .tab-btn:hover moved to @media (hover:hover) block */
.main{max-width:820px;margin:0 auto;padding:64px 14px 32px;}
.hidden{display:none!important;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card-title{font-size:1.05rem;font-weight:700;margin-bottom:10px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:8px;font-size:.85rem;font-weight:600;min-height:42px;min-width:42px;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}/* .btn-primary:hover moved to @media (hover:hover) block */
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}/* .btn-outline:hover moved to @media (hover:hover) block */
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:5px 12px;font-size:.78rem;min-height:34px;}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.filter-row select,.filter-row label{min-height:42px;padding:7px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:.84rem;}
.filter-row label{display:flex;align-items:center;gap:5px;cursor:pointer;}
.filter-row label input{width:18px;height:18px;accent-color:var(--accent);}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.q-badge{font-size:.7rem;padding:3px 9px;border-radius:16px;font-weight:600;}
.q-badge.year{background:rgba(124,108,240,.18);color:var(--accent);}
.q-badge.unit{background:rgba(34,197,94,.12);color:var(--success);}
.q-badge.type{background:rgba(234,179,8,.12);color:var(--warning);}
.q-badge.verify.fixed{background:rgba(16,185,129,.12);color:#047857;}
.q-badge.verify.conflict{background:rgba(59,130,246,.12);color:#1d4ed8;}
.q-badge.verify.review{background:rgba(239,68,68,.12);color:#b91c1c;}
.q-badge.verify.invalid{background:rgba(107,114,128,.14);color:#374151;}
.q-num{font-size:.82rem;color:var(--text2);font-weight:600;}
.q-text{font-size:1rem;font-weight:600;line-height:1.65;margin-bottom:18px;}
.choices{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.choice-btn{text-align:left;padding:13px 16px;border-radius:var(--radius);background:var(--card);border:2px solid var(--border);color:var(--text);font-size:.9rem;line-height:1.5;transition:all .15s;min-height:42px;position:relative;padding-left:46px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.choice-btn .choice-num{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.73rem;font-weight:700;color:var(--text2);}
/* .choice-btn:hover moved to @media (hover:hover) block */
.choice-btn.correct{border-color:var(--success);background:rgba(16,185,129,.12);animation:pulse-g .4s;font-weight:700;color:#065f46;}
.choice-btn.correct .choice-num{background:var(--success);color:#fff;}
.choice-btn.correct::after{content:' \2713';font-weight:700;color:var(--success);}
.choice-btn.wrong{border-color:var(--danger);background:rgba(239,68,68,.12);animation:shake .4s;color:#991b1b;}
.choice-btn.wrong .choice-num{background:var(--danger);color:#fff;}
.choice-btn.wrong::after{content:' \2717';font-weight:700;color:var(--danger);}
.choice-btn.show-correct{border-color:var(--success);background:rgba(16,185,129,.08);font-weight:700;color:#065f46;}
.choice-btn.show-correct .choice-num{background:var(--success);color:#fff;}
.choice-btn.show-correct::after{content:' \2713 \uc815\ub2f5';font-size:.78rem;font-weight:700;color:var(--success);}
@keyframes pulse-g{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 6px rgba(34,197,94,.18)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.explanation{background:rgba(108,92,231,.06);border:1px solid rgba(108,92,231,.18);border-radius:var(--radius);padding:16px;margin-top:10px;line-height:1.7;font-size:.9rem;display:none;color:var(--text);}
.explanation.show{display:block;animation:fadeIn .3s;}
.explanation strong{color:var(--accent);}
.prof-tip{margin-top:10px;padding:10px 14px;border-radius:var(--radius);background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-left:4px solid var(--success);font-size:.84rem;line-height:1.6;color:#047857;}
.prof-tip::before{content:"[Prof] ";}
.verification-box{margin-top:10px;padding:12px 14px;border-radius:var(--radius);font-size:.84rem;line-height:1.65;}
.verification-box .verification-label{display:inline-block;margin-bottom:6px;font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:999px;}
.verification-box.fixed{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);border-left:4px solid var(--success);color:#065f46;}
.verification-box.fixed .verification-label{background:rgba(16,185,129,.14);color:#047857;}
.verification-box.conflict{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.16);border-left:4px solid #3b82f6;color:#1e3a8a;}
.verification-box.conflict .verification-label{background:rgba(59,130,246,.14);color:#1d4ed8;}
.verification-box.review{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.16);border-left:4px solid var(--danger);color:#991b1b;}
.verification-box.review .verification-label{background:rgba(239,68,68,.14);color:#b91c1c;}
.verification-box.invalid{background:rgba(107,114,128,.1);border:1px solid rgba(107,114,128,.18);border-left:4px solid #6b7280;color:#374151;}
.verification-box.invalid .verification-label{background:rgba(107,114,128,.16);color:#4b5563;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.progress-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;}
.score-display{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--text2);margin-bottom:6px;}
.q-nav{display:flex;gap:10px;margin-top:18px;justify-content:space-between;}
.result-card{text-align:center;padding:28px 18px;}
.result-score{font-size:2.8rem;font-weight:800;color:var(--accent);margin:14px 0 6px;}
.result-label{font-size:.95rem;color:var(--text2);margin-bottom:20px;}
.donut-wrap{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin:20px 0;}
.donut-item{text-align:center;}.donut-item .label{font-size:.75rem;color:var(--text2);margin-top:6px;}
.donut{width:72px;height:72px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.donut .pct{font-size:.82rem;font-weight:700;}
.wrong-item{padding:10px 0;border-bottom:1px solid var(--border);}.wrong-item:last-child{border:none;}
.wi-q{font-size:.88rem;font-weight:600;margin-bottom:4px;}.wi-a{font-size:.82rem;color:var(--success);}
.fc-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.fc-counter{font-size:.82rem;color:var(--text2);margin-left:auto;}
.fc-card-wrap{perspective:800px;height:calc(100vh - 280px);min-height:200px;max-height:500px;margin-bottom:0;}
.fc-card{width:100%;height:100%;position:relative;transition:transform .5s;transform-style:preserve-3d;cursor:pointer;}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;padding:20px 18px;display:flex;flex-direction:column;align-items:center!important;justify-content:flex-start!important;text-align:center!important;border:none;box-shadow:0 4px 20px rgba(108,92,231,.12);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.fc-front{background:#fff;font-size:1.3rem;font-weight:700;line-height:1.6;color:var(--text);border:2px solid var(--border);}
.fc-back{background:#fff;transform:rotateY(180deg);font-size:1.1rem;line-height:1.8;color:var(--text);border:2px solid var(--accent);}
.fc-btns{position:fixed;bottom:0;left:0;right:0;display:flex;gap:16px;justify-content:center;padding:14px 20px;background:var(--bg);border-top:1px solid var(--border);z-index:50;}
.fc-btns .btn{padding:14px 32px;font-size:1rem;min-height:50px;border-radius:12px;font-weight:700;flex:1;max-width:180px;}
.chapter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chapter-tab{padding:6px 14px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;}
.chapter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.topic-table{width:100%;border-collapse:collapse;font-size:.86rem;margin-top:10px;}
.topic-table th{text-align:left;padding:10px 8px;border-bottom:2px solid var(--accent);color:var(--accent);font-size:.78rem;font-weight:700;}
.topic-table td{padding:10px 8px;border-bottom:1px solid var(--border);}
.topic-table tr:nth-child(even){background:rgba(108,92,231,.03);}
.rank-s,.rank-a{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700;}
.rank-s{background:rgba(239,68,68,.15);color:var(--danger);}
.rank-a{background:rgba(234,179,8,.15);color:var(--warning);}
.prof-bubble{padding:16px;border-radius:var(--radius);background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.prof-bubble .importance{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:8px;letter-spacing:.02em;}
.prof-bubble .importance.critical{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.prof-bubble .importance.high{background:rgba(245,158,11,.15);color:var(--warning);border:1px solid rgba(245,158,11,.2);}
.prof-bubble .topic{font-weight:700;font-size:.95rem;margin-bottom:6px;color:var(--text);}
.prof-bubble .quote{font-size:.86rem;color:var(--text2);font-style:italic;line-height:1.7;}
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:10px;}
.flashcard{perspective:600px;min-height:140px;cursor:pointer;}
.flashcard-inner{width:100%;min-height:140px;transition:transform .4s;transform-style:preserve-3d;position:relative;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-front,.flashcard-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;padding:14px 12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.84rem;line-height:1.6;border:1px solid var(--border);}
.flashcard-front{background:var(--card);font-weight:600;}
.flashcard-back{background:#ede9fe;transform:rotateY(180deg);color:#4c3fb5;}
.frac-card{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px;}
.frac-title{font-weight:600;font-size:.88rem;}.frac-nerve{font-size:.82rem;color:var(--success);}
.lm-section{margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.lm-section-title{font-size:1.05rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--accent);color:var(--accent);}
.lm-item{padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:8px;font-size:.88rem;line-height:1.7;}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:700;margin-right:6px;}
.tag.s{background:rgba(239,68,68,.15);color:var(--danger);}
.tag.a{background:rgba(234,179,8,.15);color:var(--warning);}
.nerve-level-table{width:100%;border-collapse:collapse;font-size:.84rem;}
.nerve-level-table th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--border);color:var(--text2);font-size:.75rem;}
.nerve-level-table td{padding:8px 6px;border-bottom:1px solid var(--border);}
.critical-list{display:flex;flex-direction:column;gap:6px;}
.cl-item{padding:10px;border-radius:6px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);font-size:.84rem;line-height:1.6;}
.cl-item strong{color:var(--danger);}
@media print{body{background:#fff;color:#000;}.nav,.tab-btn,.btn,.fc-btns,.filter-row,.q-nav{display:none!important;}.main{padding:10px;}.card,.lm-item,.prof-bubble,.frac-card,.cl-item{border:1px solid #ccc;background:#fff;color:#000;break-inside:avoid;}.explanation{display:block!important;}}

/* ===== iOS Safari 완벽 호환 ===== */
* {
  -webkit-tap-highlight-color: rgba(0,0,0,0);
  -webkit-touch-callout: none;
}
html {
  -webkit-text-size-adjust: 100%;
  height: -webkit-fill-available;
}
body {
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  font-size: 16px !important;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
}
/* iOS SafeArea */
@supports (padding: env(safe-area-inset-top)) {
  body {
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .nav {
    padding-top: env(safe-area-inset-top);
  }
  .main {
    padding-top: calc(64px + env(safe-area-inset-top));
  }
}
/* 모바일 터치 최적화 */
button, .tab-btn, .btn, select, summary, [onclick] {
  min-height: 44px !important;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(100,100,255,0.1);
  cursor: pointer;
}
input[type="checkbox"] {
  min-height: 20px !important;
  min-width: 20px !important;
  touch-action: manipulation;
  accent-color: var(--accent);
}
.choice-btn {
  padding: 13px 16px 13px 46px !important;
}
.choice-btn, .btn {
  margin-bottom: 8px !important;
  font-size: 15px !important;
  line-height: 1.5 !important;
}
select {
  font-size: 16px !important; /* iOS zoom 방지: 16px 미만이면 자동 줌 */
  padding: 10px 12px !important;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 16px;
  padding-right: 32px !important;
}
/* iOS :hover 분리 - 모든 hover 스타일을 여기에 집중 */
@media (hover: hover) {
  .choice-btn:hover:not(.answered) {
    border-color: var(--accent);
    background: rgba(124,108,240,.05);
  }
  .tab-btn:hover:not(.active) {
    background: rgba(124,108,240,.12);
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
}
@media (hover: none) {
  .choice-btn:active:not(.answered) {
    border-color: var(--accent);
    background: rgba(108,92,231,.12);
    transform: scale(0.98);
    transition: transform .1s;
  }
  .tab-btn:active:not(.active) {
    background: rgba(124,108,240,.15);
  }
  .btn-primary:active { background: var(--accent2); }
  .btn-outline:active { border-color: var(--accent); color: var(--accent); }
}
/* iOS position:fixed - sticky 제거, fixed 유지 */
/* flashcard div cursor for iOS click */
.fc-card, .flashcard {
  cursor: pointer;
}
/* Confused (bookmark) button */
.confused-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:1.1rem;min-height:36px!important;min-width:36px!important;padding:4px 8px!important;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.confused-btn.active{color:var(--warning);border-color:var(--warning);background:rgba(234,179,8,.1);}
.confused-btn:hover{border-color:var(--warning);color:var(--warning);}
.fc-confused-wrap{display:flex;justify-content:flex-end;margin-bottom:6px;}

/* ===== Image Browser Modal ===== */
.img-modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.img-modal-overlay.open{display:flex;flex-direction:column;align-items:center;}
.img-modal{width:100%;max-width:860px;margin:0 auto;padding:16px;min-height:100%;}
.img-modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;position:sticky;top:0;z-index:201;background:rgba(245,245,247,.96);backdrop-filter:blur(8px);border-radius:12px;margin-bottom:12px;padding:12px 16px;}
.img-modal-title{font-size:1.05rem;font-weight:700;color:var(--text);}
.img-modal-close{background:var(--bg);border:1px solid var(--border);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--text2);cursor:pointer;min-height:44px!important;min-width:44px!important;}
.img-modal-loading{text-align:center;padding:40px;color:var(--text2);font-size:.9rem;}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding-bottom:32px;}
@media(max-width:480px){.img-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}}
.img-thumb-wrap{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--card);cursor:pointer;aspect-ratio:1/1;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s;}
.img-thumb-wrap:active{transform:scale(.97);}
.img-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.img-thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:.68rem;padding:3px 6px;text-align:center;font-weight:600;}
/* Image Viewer (fullscreen single image) */

// === 2023 (Q1-Q60) ===
{id:1,year:2023,unit:"Upper Limb",q:"Pectoralis, subclavius, deltoid m. 등의 혈류량이 감소하였다. 손상된 가능성이 가장 큰 것은?",choices:["Dorsal scapular a.","Thoracodorsal a.","Thoracoacromial a.","Circumflex scapular a.","Suprascapular a."],answer:2,explanation:"Thoracoacromial a.는 axillary a.의 2nd branch로 Pectoralis, Deltoid, Acromion, Clavicle(subclavius)에 혈액 공급.",profTip:"She Taste Like Sweet Apple Pie 외우기!",type:"짤기"},
{id:2,year:2023,unit:"Upper Limb",q:"오른손 검지의 DIP joint flexion이 안된다. 손상된 구조물은?",choices:["FDP - Ant. interosseous n.","FDS - Median n.","FPL - Median n.","FPB - Median n.","Palmar interossei - Ulnar n."],answer:0,explanation:"DIP flexion = FDP. Ant. interosseous n.(median n. branch)가 지배.",profTip:"교수님: FPL -> ant. interosseous n. 국시에도 나온다!",type:"짤기"},
{id:3,year:2023,unit:"Back",q:"어깨의 외측회전에 어려움을 겪는 환자. 손상 가능성이 높은 근육은?",choices:["Subscapularis m.","Infraspinatus m.","Supraspinatus m.","Teres major m.","Teres minor m."],answer:1,explanation:"Shoulder lat. rotation = Infraspinatus > Teres minor.",type:"짤기"},
{id:4,year:2023,unit:"Back",q:"위 환자에게 가장 손상이 클 가능성이 높은 신경은?",choices:["Dorsal scapular n.","Suprascapular n.","Upper subscapular n.","Lower subscapular n.","Axillary n."],answer:1,explanation:"Infraspinatus -> Suprascapular n.",type:"짤기"},
{id:5,year:2023,unit:"Upper Limb",q:"교통사고 후 wrist drop이 관찰된다. 손상된 신경은?",choices:["Ulnar n.","Ant. interosseous n.","Post. interosseous n.","Median n.","Radial n."],answer:4,explanation:"Wrist drop = Radial n. 손상. Extensor들이 마비되어 손목이 떨어짐.",profTip:"교수님 강조: 뼈 멀쩡한데 손목 축 처지면 radial nerve!",type:"짤기"},
{id:6,year:2023,unit:"Upper Limb",q:"Humerus med. epicondyle fracture 시 가장 손상 가능성 높은 구조물은?",choices:["Ulnar n.","Radial n.","Brachial n.","Common interosseous a.","Ulnar recurrent a."],answer:0,explanation:"Med. epicondyle 뒤를 ulnar n.가 지나감.",type:"짤기"},
{id:7,year:2023,unit:"Upper Limb",q:"14세 소년 Scaphoid bone 부근 손상. 가능성 높은 구조는?",choices:["Flex. pollicis brevis m.","Ext. pollicis brevis m.","Opponens pollicis m.","Flex. carpi radialis m.","Ext. carpi radialis m."],answer:3,explanation:"Scaphoid 위로 FCR tendon이 지나감.",type:"짤기"},
{id:8,year:2023,unit:"Upper Limb",q:"손등 엄지-검지 사이 근육이 위축되었다. 손상된 구조물은?",choices:["Ant. interosseous n.","Post. interosseous n.","Opponens pollicis m.","Ext. pollicis brevis m.","Dorsal interossei m."],answer:4,explanation:"엄지-검지 사이 손등쪽 = 1st dorsal interosseous m.",type:"짤기"},
{id:9,year:2023,unit:"Upper Limb",q:"Radial a. 혈류 저하 시 가장 가능성 높은 증상은?",choices:["Supf. palmar arch 혈류 저하","Flexor retinaculum 표층 맥박 감소","Forearm extensor mm. 혈류 저하","Princeps pollicis a. 혈류 저하","Ant. interosseous a. 혈류 저하"],answer:3,explanation:"Princeps pollicis a.는 radial a.의 직접 분지. 나머지는 ulnar a. 계통.",type:"짤기"},
{id:10,year:2023,unit:"Upper Limb",q:"Clavicle 골절 사진. 손상을 가장 적게 받는 구조물은?",choices:["Coracoacromial lig.","Biceps short head","Coracobrachialis m.","Coracoclavicular lig.","Coracohumeral lig."],answer:4,explanation:"Coracohumeral lig.가 coracoid process에서 가장 멀리 위치.",type:"짤기"},
{id:11,year:2023,unit:"Back",q:"검사자의 손을 밀어내지 못한다 (medial rotation 검사). 손상된 근육은?",choices:["Latissimus dorsi m.","Supraspinatus m.","Subscapularis m.","Rhomboid m.","Trapezius m."],answer:2,explanation:"Humerus medial rotation = Subscapularis m. 회전근개 중 유일한 medial rotator.",type:"짤기"},
{id:12,year:2023,unit:"Upper Limb",q:"Axillary a. 분지로 pectoralis minor m. 위를 주행하는 동맥은?",choices:["Dorsal scapular a.","Circumflex scapular a.","Thoracoacromial a.","Transverse cervical a.","Suprascapular a."],answer:2,explanation:"She Taste Like Sweet Apple Pie.",type:"짤기"},
{id:13,year:2023,unit:"Lower Limb",q:"Head of talus가 손상되었다. 이상이 생길 수 있는 부위는?",choices:["Transverse arch","Medial longitudinal arch","Lateral longitudinal arch","Tendon of peroneus","Long plantar ligament"],answer:1,explanation:"Head of talus = medial longitudinal arch의 keystone.",type:"짤기"},
{id:14,year:2023,unit:"Upper Limb",q:"Brachial plexus posterior cord 손상 시 이상이 있는 근육은?",choices:["Supraspinatus m.","Brachialis m.","Pectoralis maj. m.","Pectoralis min. m.","Latissimus dorsi m."],answer:4,explanation:"Post. cord = ULTRA. Latissimus dorsi = thoracodorsal n.",type:"짤기"},
{id:15,year:2023,unit:"Upper Limb",q:"Elbow pain + supination 불가. 손상된 신경은?",choices:["Median + Ulnar n.","Ulnar + Radial n.","Radial + Musculocutaneous n.","Ulnar + Axillary n.","Musculocutaneous + Median n."],answer:2,explanation:"Supination = Supinator(radial n.) + Biceps(musculocutaneous n.).",type:"짤기"},
{id:16,year:2023,unit:"Back",q:"Spinoglenoid notch 골절 시 마비될 가능성 높은 근육은?",choices:["Supraspinatus + Trapezius","Infraspinatus + Trapezius","Rhomboid maj. + Trapezius","Rhomboid min. + Latissimus dorsi","Subclavius + Latissimus dorsi"],answer:1,explanation:"교수님 3년 연속 확인 답. (참고: 교과서에서는 spinoglenoid notch 이후 infraspinatus만 단독 마비. Trapezius는 CN XI 지배로 suprascapular n.과 무관. 교수님 답과 교과서가 다르므로 친구들과 확인 권장). 선지 설계에 논란 있으나 기출 답 그대로 외울 것.",profTip:"교수님 3년 연속 확인 답. 선지 설계에 논란 있으나 기출 답 그대로 외울 것.",type:"짤기"},
{id:17,year:2023,unit:"Upper Limb",q:"환자가 Arm을 medial rotation 시키고 있다. 통증을 느낀 근육은?",choices:["Deltoid m.","Brachialis m.","Coracobrachialis m.","Biceps brachii m.","Infraspinatus m."],answer:0,explanation:"Deltoid m. Ant. part = medially rotates arm.",type:"기변"},
{id:18,year:2023,unit:"Back",q:"Suboccipital triangle의 suboccipital nerve 손상 시 영향이 가장 적은 것은?",choices:["Rectus capitis post. maj.","Semispinalis capitis","Splenius capitis","Oblique capitis sup.","Oblique capitis inf."],answer:2,explanation:"Splenius capitis는 뒷통수가 아닌 옆쪽을 향해 가므로 영향이 적음.",type:"짤기"},
{id:19,year:2023,unit:"Lower Limb",q:"대퇴부의 flexion, abduction, lat. rotation이 안된다. 손상된 근육은?",choices:["Piriformis m.","Sartorius m.","Tensor fasciae latae","Obturator internus m.","Iliopsoas m."],answer:1,explanation:"Flexion + Abduction + Lat. rotation = 제기차기 = Sartorius.",type:"짤기"},
{id:20,year:2023,unit:"Upper Limb",q:"Brachial a. 기시부 결찰 시 deep brachial a.에 혈액 공급하는 동맥은?",choices:["Lat. thoracic a.","Subscapular a.","Post. circumflex humeral a.","Sup. collateral ulnar a.","Radial recurrent a."],answer:2,explanation:"Post. circumflex humeral a.는 axillary a.의 분지. Anastomosis로 우회 공급.",type:"짤기"},
{id:21,year:2023,unit:"Back",q:"Superficial br. of transverse cervical a. 이상 시 손상 가능성 높은 근육은?",choices:["Latissimus dorsi m.","Supraspinatus m.","Infraspinatus m.","Trapezius m.","Rhomboid major m."],answer:3,explanation:"Trapezius = Supf. br. of transverse cervical a.",type:"짤기"},
{id:22,year:2023,unit:"Back",q:"Trapezius, rhomboid mm.에 혈액 공급하는 동맥은?",choices:["Dorsal scapular a.","Suprascapular a.","Lat. thoracic a.","Circumflex scapular a.","Thoracodorsal a."],answer:0,explanation:"Dorsal scapular a. = deep br. of transverse cervical a.",type:"짤기"},
{id:23,year:2023,unit:"Upper Limb",q:"Supinator와 abductor pollicis longus에 혈액 공급하는 혈관은?",choices:["Radial a.","Ulnar a.","Ulnar recurrent a.","Ant. interosseous a.","Post. interosseous a."],answer:3,explanation:"깊은 층의 근육 -> ant. interosseous a.",type:"짤기"},
{id:24,year:2023,unit:"Upper Limb",q:"Carpal tunnel 부위 병변. 손상되는 구조는?",choices:["Flexor pollicis brevis","Opponens pollicis","Median n.","Ulnar n.","Radial n."],answer:2,explanation:"Carpal tunnel = flexor tendon들 + median n.",profTip:"교수님: palmaris longus tendon 밑으로 median nerve가 지나간다!",type:"짤기"},
{id:25,year:2023,unit:"Upper Limb",q:"Deltoid 운동 검사. 손상된 신경은?",choices:["Subscapular n.","Thoracodorsal n.","Axillary n.","Dorsal scapular n.","Suprascapular n."],answer:2,explanation:"Deltoid m. = Axillary n.",type:"짤기"},
{id:26,year:2023,unit:"Lower Limb",q:"MRI: Med. malleolus 부분 손상. 다칠 위험이 높은 구조물은?",choices:["Common peroneal n.","Supf. peroneal n.","Deep peroneal n.","Tibial n.","Sural n."],answer:3,explanation:"Med. malleolus 뒤쪽 = Tibial n. Tom Dick ANd Very Nervous Harry.",type:"짤기"},
{id:27,year:2023,unit:"Lower Limb",q:"3,4번째 발가락 감각 소실 + plantarflexion 어려움. 손상된 신경은?",choices:["Supf. peroneal n.","Lat. plantar n.","Med. plantar n.","Deep peroneal n.","Tibial n."],answer:0,explanation:"3,4번째 발가락 감각 + peroneus longus/brevis(plantarflexion) = Supf. peroneal n.",type:"짤기"},
{id:28,year:2023,unit:"Upper Limb",q:"Winged scapula. Brachial plexus 중 손상 부위는?",choices:["Root","Trunk","Division","Cords","Terminal branches"],answer:0,explanation:"Winged scapula = Serratus ant. = Long thoracic n. = C5-7 Root에서 바로 분지.",type:"짤기"},
{id:29,year:2023,unit:"Lower Limb",q:"종아리 외측 근육에 혈액 공급하는 동맥은?",choices:["Ant. tibial a.","Post. tibial a.","Peroneal a.","Ant. med. malleolar a.","Post. med. malleolar a."],answer:2,explanation:"Peroneal(fibular) a. = post. tibial a.에서 분지.",type:"짤기"},
{id:30,year:2023,unit:"Lower Limb",q:"발의 dorsiflexion과 inversion이 잘 되지 않는다. 손상 가능성 높은 근육은?",choices:["Peroneus longus m.","Peroneus brevis m.","Tibialis ant. m.","Extensor digitorum longus m.","Peroneus tertius m."],answer:2,explanation:"Dorsiflexion + Inversion = Tibialis ant. m.",type:"짤기"},
{id:31,year:2023,unit:"Lower Limb",q:"대퇴골두 무혈성 괴사(AVN)를 일으키는 혈관은?",choices:["Obturator a.","Superior gluteal a.","Inferior gluteal a.","Medial circumflex femoral a.","Lateral circumflex femoral a."],answer:3,explanation:"Femoral head 주된 혈액공급 = Med. circumflex femoral a.",profTip:"교수님: hip dislocation 정복 후 반드시 혈관 확인!",type:"짤기"},
{id:32,year:2023,unit:"Lower Limb",q:"발목 과도한 plantarflexion/inversion 시 손상 가능성 높은 인대는?",choices:["Calcaneofibular lig.","Ant. talofibular lig.","Talonavicular lig.","Deltoid lig.","Ant. tibiofibular lig."],answer:1,explanation:"Hyperinversion = Ant. talofibular lig. 가장 먼저 손상!",profTip:"교수님: 슬리퍼 끌고 까불다 접질리면 대부분 이거!",type:"짤기"},
{id:33,year:2023,unit:"Lower Limb",q:"Obturator n. + sciatic n. 일부 손상 시 완전 마비되는 근육은?",choices:["Rectus femoris m.","Biceps femoris short head","Semitendinosus m.","Adductor magnus m.","Sartorius m."],answer:3,explanation:"Adductor magnus = obturator n.(adductor pt) + sciatic n.(hamstring pt) 이중 지배.",type:"짤기"},
{id:34,year:2023,unit:"Lower Limb",q:"대퇴 extension + 하퇴 flexion 불가. 손상된 근육은?",choices:["Short head of biceps femoris","Adductor magnus m.","Semitendinosus m.","Sartorius m.","Gracilis m."],answer:2,explanation:"Hip ext. + Knee flex. = Semitendinosus.",type:"짤기"},
{id:35,year:2023,unit:"Lower Limb",q:"MRI 무릎 사진. 손상된 부위는?",choices:["Medial meniscus","Lateral meniscus","Tibial collateral lig.","Fibular collateral lig.","Posterior cruciate lig."],answer:2,explanation:"Med. side: meniscus와 collateral lig.가 붙어 있음.",profTip:"교수님: 충격 반대쪽 인대 손상. 교통사고 -> medial side.",type:"짤기"},
{id:36,year:2023,unit:"Lower Limb",q:"Deltoid lig. 부위 MRI 사진. 손상된 구조는?",choices:["Deltoid lig.","Talonavicular lig.","Ant. talofibular lig.","Ant. talotibial lig.","Calcaneonavicular lig."],answer:0,explanation:"Med. malleolus 쪽 손상 = Deltoid lig.",type:"짤기"},
{id:37,year:2023,unit:"Upper Limb",q:"분만 후 아기 오른팔 축 늘어짐. Upper brachial plexus palsy 증상은?",choices:["Wrist flexion","Elbow flexion","Abduction","Supination","Lateral rotation"],answer:0,explanation:"Erb palsy = Sup. trunk(C5,C6) 손상. Waiter-tip deformation.",type:"탈기"},
{id:38,year:2023,unit:"Upper Limb",q:"화살표 부위 병변. 손상된 근육은? (엄지-중지 잇는 깊은층)",choices:["Flexor pollicis brevis m.","Opponens pollicis m.","Adductor pollicis m.","Abductor pollicis brevis m."],answer:2,explanation:"엄지-중지를 잇고 가장 깊은 층 = Adductor pollicis m.",type:"짤기"},
{id:39,year:2023,unit:"Upper Limb",q:"Wrist의 능동적 움직임에도 동작 문제. 손상된 구조는?",choices:["ECRL m.","ECU m.","FCR m.","FCU m.","TFCC"],answer:4,explanation:"능동적으로 움직여도 문제 = 관절 문제(근육 아님). TFCC.",profTip:"교수님이 수업에서 직접 보여주며 강조한 검사!",type:"탈기"},
{id:40,year:2023,unit:"Upper Limb",q:"아이의 팔을 잡아당겼더니 elbow 문제. 손상된 구조는?",choices:["Sup. trunk","Musculocutaneous n.","Tendon of biceps long head","Coracobrachialis","Annular lig."],answer:4,explanation:"만 3세 이하 소아 elbow subluxation = annular lig. 손상.",profTip:"교수님: 올해 새로 추가된 파트, 출제 확률 높음!",type:"탈기"},
{id:41,year:2023,unit:"Upper Limb",q:"C7-T1 사이 추간판 탈출. 손상된 부위는?",choices:["C3-C4 사이","C4-C5 사이","C5-C6 사이","C6-C7 사이","C7-T1 사이"],answer:4,explanation:"새끼손가락 = C8 = ulnar.",type:"짤기"},
{id:42,year:2023,unit:"Lower Limb",q:"발등 맥박 약하고 감각 무딤. 손상된 동맥은?",choices:["Popliteal a.","Peroneal a.","Ant. tibial a.","Post. tibial a.","Ant. tibial recurrent a."],answer:2,explanation:"발등 맥박 = dorsalis pedis a. = ant. tibial a.의 연장.",type:"짤기"},
{id:43,year:2023,unit:"Lower Limb",q:"허리 통증 + 엄지-검지 발가락 사이 통증. 손상된 척수 부위는?",choices:["T12","L1","L3","L5","S1"],answer:3,explanation:"발등 엄지-검지 사이 = deep peroneal n. -> L5.",type:"짤기"},
{id:44,year:2023,unit:"Lower Limb",q:"Knee extension 불가. 신경학적 검사로 알 수 있는 손상 부위는?",choices:["T12","L1","L2-L4","L5, S1","S1, S2"],answer:2,explanation:"Knee extension = quadriceps = femoral n. = L2-L4.",profTip:"교수님 빨간 강조: Knee Ext L3-4, Dorsiflex L5, Plantarflex S1",type:"짤기"},
{id:45,year:2023,unit:"특수감각기",q:"Rod cell과 cone cell이 분포하는 망막 층은?",choices:["A (RPE)","B (Photoreceptive layer)","C (ELM)","D (ONL)","E (INL)"],answer:1,explanation:"Rod/Cone 세포질 = photoreceptive layer.",type:"기변"},
{id:46,year:2023,unit:"특수감각기",q:"Amacrine cell이 분포하는 망막 층은?",choices:["A","B","C","D (Inner nuclear layer)","E"],answer:3,explanation:"Amacrine cell = INL. Ganglion cell 활성 조절.",type:"기변"},
{id:47,year:2023,unit:"특수감각기",q:"안압 35mmHg. 안구방수배출 조절 기관은?",choices:["Sclera","Ciliary body","Ciliary process","Ciliary zonule","Scleral venous sinus"],answer:4,explanation:"표준 해부학 기준으로 안구방수는 trabecular meshwork를 거쳐 scleral venous sinus(Schlemm's canal)로 배출됩니다. Ciliary body는 방수 생성에 관여합니다.",profTip:"일부 복기본에서 ciliary body로 적혀 있어도 표준 배출 경로 정답은 scleral venous sinus입니다.",type:"탈기"},
{id:48,year:2023,unit:"특수감각기",q:"Tectorial membrane(B)을 분비하는 부위는?",choices:["Limbus of spiral lamina","Stria vascularis","Spiral prominence","Internal spiral sulcus","Crista ampullaris"],answer:0,explanation:"Tectorial membrane = spiral limbus(=limbus of spiral lamina)가 돌출되어 형성.",type:"짤기"},
{id:49,year:2023,unit:"특수감각기",q:"왼->오 안구진탕, 엘리베이터 상승 감지 못함. 관련 구조는?",choices:["Utricle","Saccule","Ant. semicircular duct","Post. semicircular duct","Lat. semicircular duct"],answer:1,explanation:"수직운동(엘리베이터) = Saccule. 수평운동 = Utricle.",type:"탈기"},
{id:50,year:2023,unit:"특수감각기",q:"어지럽고 귀에 액체가 꽉 찬 느낌. 관련 구조는?",choices:["Stapes","Cochlear duct","Ciliary body","Scala tympani","Endolymphatic duct"],answer:4,explanation:"어지러움(균형기관) + 액체 느낌(endolymph) = endolymphatic duct.",type:"탈기"},
{id:51,year:2023,unit:"발생학",q:"척추 발생에 대한 설명 중 옳은 것은?",choices:["Folic acid -> congenital scoliosis 예방","Notochord -> vertebral body 안에서 nucleus pulposus","Klippel-feil -> AFP 높음","Spina bifida에서 hair만 보이면 예후 나쁨","Sclerotome 이동 시 myotome도 이동"],answer:2,explanation:"(참고: AFP 상승은 open neural tube defect(무뇌증, 개방성 척추이분증)의 지표. KFS 자체와 AFP 연관은 문헌에 없음. 교수님 답과 교과서가 다르므로 친구들과 확인 권장) Klippel-feil -> AFP 높음.",type:"짤기"},
{id:52,year:2023,unit:"발생학",q:"Achondroplasia에 대한 설명으로 옳은 것은?",choices:["손가락 길이 정상","얼굴보다 머리가 작다","난쟁이 중 가장 흔하다","대부분 부모에서 유전","FGF receptor의 유전적 변이"],answer:4,explanation:"FGFR3 gain-of-function.",type:"기변"},
{id:53,year:2023,unit:"발생학",q:"발가락이 5개보다 많은 기형 사진. 해당 용어는?",choices:["Syndactyly","Micromelia","Polydactyly","Microdactyly","Trident configuration"],answer:2,explanation:"손가락/발가락이 정상보다 많음 = polydactyly.",type:"탈기"},
{id:54,year:2023,unit:"발생학",q:"몸근육에 관한 설명 중 가장 적절한 것은?",choices:["DRG는 epimere를 지배","Myoepithelial cell은 lateral plate mesoderm 기원","Somitomere는 pharyngeal arch 형성에 포함","팔다리근육은 somite ventromedial mesenchyme 기원","Somite DML은 inferior oblique abdominis 형성"],answer:2,explanation:"Somitomere -> pharyngeal arch에 포함.",type:"짤기"},
{id:55,year:2023,unit:"발생학",q:"표시된 후두 근육을 형성하는 것은?",choices:["Somite","Somitomere","Neural crest","3rd pharyngeal arch","4th, 6th pharyngeal arch"],answer:4,explanation:"후두(larynx) 근육 = 4th, 6th pharyngeal arch에서 유래.",type:"기변"},
{id:56,year:2023,unit:"발생학",q:"비타민A 복용 산모 아기: 두 눈 사이 넓고 구개 갈라짐. 원인은?",choices:["Pharyngeal pouch 이상","Somite 이상","Endochondral ossification 이상","Resegmentation 이상","Neural crest migration 이상"],answer:4,explanation:"얼굴 뼈(viscerocranium) = neural crest 유래.",type:"탈기"},
{id:57,year:2023,unit:"Lower Limb",q:"윗몸 일으키기가 안된다. 문제가 있는 근육은?",choices:["Vastus medialis","Vastus intermedius","Vastus lateralis","Rectus femoris"],answer:3,explanation:"Quadriceps 중 유일하게 rectus femoris만 hip bone(AIIS)에 부착.",profTip:"정상우 tip: 레그 익스텐션 할 때 허벅지가 의자에서 뜬다는 생각으로 끝까지 차올리면 rectus femoris muscle을 키울 수 있습니다.",type:"짤기"},
{id:58,year:2023,unit:"Lower Limb",q:"Hip joint의 abduction + lat. rotation이 안된다. 손상된 근육은?",choices:["Piriformis m.","Obturator internus m.","Obturator externus m.","Gemelli m.","Gluteus minimus m."],answer:0,explanation:"Piriformis = strongest lateral rotator (Moore).",type:"짤기"},
{id:59,year:2023,unit:"Lower Limb",q:"Hip adduction + flexion + extension 모두 안된다. 손상된 근육은?",choices:["Gracilis m.","Pectineus m.","Adductor longus m.","Adductor brevis m.","Adductor magnus m."],answer:4,explanation:"Adductor magnus = adductor pt(flexion) + hamstring pt(extension). 이중 기능.",type:"짤기"},
{id:60,year:2023,unit:"Lower Limb",q:"Inversion + plantarflexion + med. rotation 불가. 손상된 근육은?",choices:["Post. tibialis m.","Gastrocnemius m.","Soleus m.","Peroneus longus m.","Flexor digitorum longus m."],answer:0,explanation:"Inversion = Tibialis 형제만 가능. 그 중 plantarflexion = posterior.",profTip:"교수님: tibialis ant.는 dorsiflexion+inv, post.는 plantarflexion+inv",type:"짤기"},
// === 2022 (Q101-Q146) ===
{id:101,year:2022,unit:"Upper Limb",q:"교통사고 후 윗팔의 벌림, 굽힘, 외측회전 등에 어려움. 손상된 신경은?",choices:["Axillary n.","Upper subscapular n.","Suprascapular n.","Lower subscapular n.","Dorsal scapular n."],answer:0,explanation:"Deltoid m. = axillary n. Abduction, flexion, lateral rotation 모두 관여.",type:"짤기"},
{id:102,year:2022,unit:"Lower Limb",q:"윗몸 일으키기가 안되었다. 문제가 있는 근육은?",choices:["Vastus medialis","Vastus intermedius","Vastus lateralis","Rectus femoris"],answer:3,explanation:"Rectus femoris만 hip bone AIIS에 부착되어 hip flexion 관여.",type:"짤기"},
{id:103,year:2022,unit:"Upper Limb",q:"pectoralis, subclavius, deltoid m. 등의 혈류량이 감소. 손상된 것은?",choices:["Dorsal scapular a.","Thoracodorsal a.","Thoracoacromial a.","Circumflex scapular a.","Suprascapular a."],answer:2,explanation:"Thoracoacromial a.는 axillary a.의 2nd branch.",type:"짤기"},
{id:104,year:2022,unit:"Upper Limb",q:"오른손이 왼손과 같은 동작을 할 수 없었다. 손상된 구조물은?",choices:["FDP-ant. interosseous n.","FDS-median n.","FPL-median n.","FPB-median n.","Palmar interossei-ulnar n."],answer:0,explanation:"DIP flexion 안됨 = FDP. Ant. interosseous n.가 지배.",profTip:"복기 오류 아닙니다. 교수님이 발문을 잘못 작성하신 듯합니다.",type:"짤기"},
{id:105,year:2022,unit:"Back",q:"어깨의 외측회전을 못하는 환자. 손상된 근육은?",choices:["Subscapularis m.","Infraspinatus m.","Supraspinatus m.","Teres major m.","Teres minor m."],answer:1,explanation:"Shoulder lateral rotation = infraspinatus m.",type:"짤기"},
{id:106,year:2022,unit:"Back",q:"5번 문제의 환자에게 가장 손상이 클 가능성이 높은 신경은?",choices:["Dorsal scapular n.","Suprascapular n.","Upper subscapular n.","Lower subscapular n.","Axillary n."],answer:1,explanation:"Infraspinatus -> suprascapular nerve.",type:"짤기"},
{id:107,year:2022,unit:"Upper Limb",q:"왼손이 오른손 같은 운동을 할 수 없었다. 손상된 구조는?",choices:["Ulnar n.","Ant. Interosseus n.","Post. Interosseus n.","Median n.","Radial n."],answer:4,explanation:"Wrist drop = radial nerve 손상.",type:"짤기"},
{id:108,year:2022,unit:"Upper Limb",q:"이상이 있을 가능성이 가장 높은 구조물은? (med. epicondyle)",choices:["Ulnar n.","Radial n.","Brachial n.","Common interosseous a.","Ulnar recurrent a."],answer:0,explanation:"Med. epicondyle fracture -> ulnar n. 손상.",type:"짤기"},
{id:109,year:2022,unit:"Upper Limb",q:"14세 소년 넘어져서 손상. 가능성 높은 구조는?",choices:["Ext. carpi radialis mm.","Flex. carpi radialis m.","Opponens pollicis m.","Ext. pollicis brevis m.","Flex. pollicis brevis m."],answer:1,explanation:"Scaphoid bone 손상 -> FCR tendon.",profTip:"2016년까지는 근육 아닌 혈관을 물었음. Scaphoid fracture시 주로 radial a. 손상.",type:"짤기"},
{id:110,year:2022,unit:"Upper Limb",q:"손상되었을 가능성이 가장 높은 구조물은? (엄지-검지 사이)",choices:["Ant. interosseous n.","Post. interosseous n.","Opponens pollicis m.","Ext. pollicis brevis m.","Dorsal interossei m."],answer:4,explanation:"손등의 엄지-검지 사이 = dorsal interossei m.",type:"탈기"},
{id:111,year:2022,unit:"Upper Limb",q:"radial a.의 혈류 저하시 나타나는 증상은?",choices:["Supf. palmar arch의 혈류 저하","Flexor retinaculum의 표층 맥박 감소","Forearm extensor mm.의 혈류 저하","Princeps pollicis a.의 혈류 저하","Ant. interosseus a.의 혈류 저하"],answer:3,explanation:"Princeps pollicis a.는 radial a.의 분지.",type:"짤기"},
{id:112,year:2022,unit:"Back",q:"팔의 힘이 현저히 떨어졌다. 손상된 구조물은? (scapula adduction 검사)",choices:["Axillary n.","Suprascapular n.","Thoracodorsal n.","Long thoracic n.","Dorsal scapular n."],answer:4,explanation:"Scapula adduction = rhomboid -> dorsal scapular n.",profTip:"시험에선 실제 사람을 검사하는 사진이 있었습니다!",type:"짤기"},
{id:113,year:2022,unit:"Upper Limb",q:"다음 중 가장 손상을 적게 받는 구조물은? (clavicle-acromion 분리)",choices:["Coracoacromial lig.","Biceps short head","Coracobrachialis m.","Coracoclavicular lig.","Coracohumeral lig."],answer:4,explanation:"Coracohumeral lig.는 가장 손상을 적게 받음.",type:"짤기"},
{id:114,year:2022,unit:"Back",q:"검사자의 손을 밀어내지 못했다. 손상 가능성이 높은 것은?",choices:["Latissimus dorsi m.","Supraspinatus m.","Subscapularis m.","Rhomboid m.","Trapezius m."],answer:2,explanation:"Humerus medial rotation = subscapularis m.",type:"짤기"},
{id:115,year:2022,unit:"Upper Limb",q:"Axillary a.의 분지로 pectoralis minor m. 위를 주행하는 a.는?",choices:["Dorsal scapular a.","Circumflex scapular a.","Thoracoacromial a.","Transverse cervical a.","Suprascapular a."],answer:2,explanation:"She Taste Like Sweet Apple Pie.",type:"짤기"},
{id:116,year:2022,unit:"Lower Limb",q:"Head of talus가 손상되었다. 이상이 생길 수 있는 부위는?",choices:["Transverse arch","Medial longitudinal arch","Lateral longitudinal arch","Tendon of peroneus","Long plantar ligament"],answer:1,explanation:"Head of talus = medial longitudinal arch의 keystone.",type:"짤기"},
{id:117,year:2022,unit:"Upper Limb",q:"Posterior cord에 손상. 마비될 가능성이 가장 높은 근육은?",choices:["Supraspinatus m.","Teres major m.","Teres minor m.","Pectoralis major m.","Latissimus dorsi m."],answer:2,explanation:"Post. cord의 main branch = axillary n. -> Teres minor.",type:"짤기"},
{id:118,year:2022,unit:"Upper Limb",q:"Elbow pain + supination 이상. 손상 신경은?",choices:["Median + ulnar n.","Ulnar + radial n.","Radial + musculocutaneous n.","Ulnar + axillary n.","Median + musculocutaneous n."],answer:2,explanation:"Supination = Supinator(radial) + Biceps(musculocutaneous).",type:"짤기"},
{id:119,year:2022,unit:"Upper Limb",q:"Arm을 medial rotation 시킬 때 통증. 손상된 근육은?",choices:["Deltoid m.","Brachialis m.","Coracobrachialis m.","Biceps brachii m.","Infraspinatus m."],answer:0,explanation:"Deltoid Ant. part = medially rotates arm.",type:"짤기"},
{id:120,year:2022,unit:"Back",q:"Spinoglenoid notch 골절 시 마비될 근육은?",choices:["Supraspinatus + trapezius","Infraspinatus + trapezius","Rhomboid major + trapezius","Rhomboid minor + latissimus dorsi","Subclavius + latissimus dorsi"],answer:1,explanation:"18학번 선배님들이 교수님께 직접 확인받은 답.",type:"짤기"},
{id:121,year:2022,unit:"Back",q:"Suboccipital triangle의 suboccipital n. 손상 시 제일 영향이 적은 것은?",choices:["Rectus capitis post. maj.","Semispinalis capitis","Splenius capitis","Obliquus capitis sup.","Obliquus capitis inf."],answer:2,explanation:"Splenius capitis는 옆쪽을 향해 가므로 영향이 적음.",type:"짤기"},
{id:122,year:2022,unit:"Lower Limb",q:"Hip/knee joint 굽히지 못하고 lat. rotation 안됨. 손상된 곳은?",choices:["Piriformis m.","Sartorius m.","Tensor fasciae latae","Obturator internus m.","Iliopsoas m."],answer:1,explanation:"Sartorius = flexion + abduction + lat. rotation(제기차기).",type:"짤기"},
{id:123,year:2022,unit:"Upper Limb",q:"Brachial a. 기시부 결찰 시 deep brachial a.에 혈액 공급하는 동맥은?",choices:["Lat. thoracic a.","Subscapular a.","Post. circumflex humeral a.","Sup. ulnar collateral a.","Radial recurrent a."],answer:2,explanation:"Post. circumflex humeral a. = axillary a. 분지. Anastomosis.",profTip:"교수님: anastomosis 관련 언급을 자주 하심. 꼭 숙지!",type:"짤기"},
{id:124,year:2022,unit:"Back",q:"Superficial br. of transverse cervical a. 이상. 손상 근육은?",choices:["Latissimus dorsi m.","Supraspinatus m.","Infraspinatus m.","Trapezius m.","Rhomboid major m."],answer:3,explanation:"Trapezius = supf. br. of transverse cervical a.",type:"짤기"},
{id:125,year:2022,unit:"Back",q:"Trapezius, rhomboid mm.에 혈액 공급하는 동맥은?",choices:["Dorsal scapular a.","Suprascapular a.","Lat. thoracic a.","Circumflex scapular a.","Thoracodorsal a."],answer:0,explanation:"Dorsal scapular a. = deep br. of transverse cervical a.",type:"짤기"},
{id:126,year:2022,unit:"Upper Limb",q:"Supinator와 adductor pollicis longus에 혈액 공급하는 혈관은?",choices:["Radial a.","Ulnar a.","Ulnar recurrent a.","Ant. interosseous a.","Post. interosseous a."],answer:3,explanation:"깊은 층 근육 -> ant. interosseous a.",type:"짤기"},
{id:127,year:2022,unit:"Upper Limb",q:"병변이 일어난 부위. 손상되는 구조는? (MRI 손목)",choices:["Flexor pollicis brevis m.","Opponens pollicis m.","Median n.","Ulnar n.","Radial n."],answer:2,explanation:"Carpal tunnel = median n.",type:"짤기"},
{id:128,year:2022,unit:"Upper Limb",q:"야구 투구 자세 운동 불가. 손상된 신경은?",choices:["Subscapular n.","Thoracodorsal n.","Axillary n.","Dorsal scapular n.","Suprascapular n."],answer:4,explanation:"야구선수 -> suprascapular n. 손상 흔함.",type:"짤기"},
{id:129,year:2022,unit:"Lower Limb",q:"표시된 곳 손상 시 다칠 위험이 제일 높은 구조물은? (med. malleolus MRI)",choices:["Common peroneal n.","Supf peroneal n.","Deep peroneal n.","Tibial n.","Sural n."],answer:3,explanation:"Med. malleolus 뒤 = tibial n.",type:"짤기"},
{id:130,year:2022,unit:"Lower Limb",q:"MRI 화살표 부위 병변. 손상 가능성이 높은 것은?",choices:["Tibial n.","Common peroneal n.","Deep peroneal n.","Supf. peroneal n.","Sciatic n."],answer:2,explanation:"다리 앞쪽 근육 = deep peroneal n.",profTip:"Complete anatomy 앱을 이용하면 cross section도 볼 수 있습니다.",type:"짤기"},
{id:131,year:2022,unit:"Lower Limb",q:"이 환자의 증상으로 가장 가능성이 높은 것은? (fibula 손상)",choices:["Dorsiflexion 장애","Plantarflexion 장애","Eversion 불가","Inversion 불가","발가락 extension 불가"],answer:2,explanation:"Fibula 손상 -> peroneus longus/brevis -> eversion 문제.",type:"짤기"},
{id:132,year:2022,unit:"Lower Limb",q:"3,4번째 발가락 감각소실 + plantarflexion 어려움. 손상된 신경은?",choices:["Supf. peroneal n.","Lat. plantar n.","Med. plantar n.","Deep peroneal n.","Tibial n."],answer:0,explanation:"3,4번째 발가락 감각 + peroneus longus/brevis = supf. peroneal n.",type:"짤기"},
{id:133,year:2022,unit:"Upper Limb",q:"Winged scapula. Brachial plexus 중 손상 부위는?",choices:["Root","Trunk","Division","Cords","Terminal branches"],answer:0,explanation:"Winged scapula = serratus ant. = long thoracic n. = root.",type:"짤기"},
{id:134,year:2022,unit:"Lower Limb",q:"Dorsiflexion + inversion 안됨. 손상 가능성 높은 근육은?",choices:["Peroneus longus m.","Peroneus brevis m.","Tibialis ant. m.","Extensor digitorum longus m.","Peroneus tertius m."],answer:2,explanation:"Dorsiflexion + inversion = tibialis ant.",type:"짤기"},
{id:135,year:2022,unit:"Lower Limb",q:"종아리 외측 근육에 혈액 공급하는 artery는?",choices:["Ant. Tibial a.","Post. tibial a.","Peroneal a.","Ant. Med. malleolar a.","Post. Med. malleolar a."],answer:2,explanation:"Peroneal a. = post. tibial a.에서 분지.",type:"짤기"},
{id:136,year:2022,unit:"Lower Limb",q:"대퇴골두 무혈성 괴사. 원인 혈관은?",choices:["Obturator a.","Superior gluteal a.","Inferior gluteal a.","Medial circumflex a.","Lateral circumflex a."],answer:3,explanation:"Med. circumflex femoral a. -> lat. epiphyseal a.",type:"짤기"},
{id:137,year:2022,unit:"Lower Limb",q:"발목 hyperinversion 시 손상될 인대는?",choices:["Calcaneofibular lig.","Ant. Talofibular lig.","Talonavicular lig.","Deltoid lig.","Ant. Tibiofibular lig."],answer:1,explanation:"Hyperinversion -> ant. talofibular lig. 먼저 손상.",type:"짤기"},
{id:138,year:2022,unit:"Lower Limb",q:"축구 경기 중 화살표 부위 손상. 가장 어려운 동작은?",choices:["Dorsiflexion","Inversion","Plantarflexion","Eversion","Extension of thumb toe"],answer:1,explanation:"Tibialis ant. 손상 -> inversion 어려움.",profTip:"답이 2번 or 5번으로 논란이 있었던 문제.",type:"짤기"},
{id:139,year:2022,unit:"Lower Limb",q:"Obturator n.와 sciatic n. 일부 손상 시 완전 마비되는 근육은?",choices:["Rectus femoris m.","Biceps femoris short head","Semitendinosus m.","Adductor magnus m.","Sartorius m."],answer:3,explanation:"Adductor magnus = obturator + sciatic 이중 지배.",type:"짤기"},
{id:140,year:2022,unit:"Lower Limb",q:"MRI 무릎 화살표 부분 손상. 어느 부위인가?",choices:["Medial meniscus","Lateral meniscus","Tibial collateral lig.","Fibular collateral lig.","Post. cruciate lig."],answer:3,explanation:"Meniscus와 떨어져 있음 -> fibular collateral lig.",type:"짤기"},
{id:141,year:2022,unit:"Lower Limb",q:"대퇴 extension + 하퇴 flexion 불가. 손상된 근육은?",choices:["Short head of biceps femoris","Adductor magnus m.","Semitendinosus m.","Sartorius m.","Gracilis m."],answer:2,explanation:"Hip ext. + Knee flex. = semitendinosus.",type:"짤기"},
{id:142,year:2022,unit:"Lower Limb",q:"화살표가 가리키는 곳(med. malleolus) 부상. 손상된 구조는?",choices:["Deltoid lig.","Talonavicular lig.","Ant. talofibular lig.","Ant. tibiofibular lig.","Cuneonavicular lig."],answer:0,explanation:"Med. malleolus -> deltoid lig.",type:"짤기"},
{id:143,year:2022,unit:"Upper Limb",q:"화살표 부분 병변. 손상된 근육은? (엄지-중지, 깊은층)",choices:["Flexor pollicis brevis m.","Opponens pollicis m.","Adductor pollicis m.","Abductor pollicis brevis m."],answer:2,explanation:"엄지-중지, 가장 깊은 층 = adductor pollicis m.",profTip:"19학번에서 처음 나왔던 탈기가 그대로 나온 문제.",type:"탈기"},
{id:144,year:2022,unit:"Lower Limb",q:"Inversion + plantarflexion + med. rotation 불가. 이상 있는 근육은?",choices:["Post. Tibialis m.","Gastrocnemius m.","Soleus m.","Peroneus longus m.","Flexor digitorum longus m."],answer:0,explanation:"Inversion + plantarflexion = tibialis post.",type:"짤기"},
{id:145,year:2022,unit:"Lower Limb",q:"Hip adduction + flexion + extension 안됨. 손상된 근육은?",choices:["Gracilis m.","Pectineus m.","Adductor longus m.","Adductor brevis m.","Adductor magnus m."],answer:4,explanation:"Adductor magnus = 이중 기능(flexion + extension).",type:"짤기"},
{id:146,year:2022,unit:"Lower Limb",q:"대퇴의 abducting + lat. rotating이 잘 안됨. 손상된 근육은?",choices:["Piriformis m.","Obturator internus m.","Obturator externus m.","Gemelli m.","Gluteus minimus m."],answer:0,explanation:"Piriformis = the strongest lateral rotator (Moore).",profTip:"Moore 교과서 7th ed. Chapter 6, page 319-320.",type:"짤기"},
// === 2021 (Q201-Q254) ===
{id:201,year:2021,unit:"Upper Limb",q:"교통사고 이후 윗팔의 벌림 굽힘 외측회전 등에 어려움. 손상된 신경은?",choices:["Axillary n.","Upper subscapular n.","Suprascapular n.","Lower subscapular n.","Dorsal scapular n."],answer:0,explanation:"Deltoid m. = axillary n.",type:"탈기"},
{id:202,year:2021,unit:"Upper Limb",q:"PIP, MCP, wrist, elbow joint가 굽혀지지 않았다. 손상 근육은?",choices:["Palmar interossei","Dorsal interossei","FDP","FDS","Lumbricals"],answer:3,explanation:"Humerus부터 intermediate phalanges까지 = FDS.",type:"탈기"},
{id:203,year:2021,unit:"Upper Limb",q:"Subscapularis, teres maj/min, triceps long head에 혈액 공급하는 혈관은?",choices:["Suprascapular a.","Circumflex scapular a.","Dorsal scapular a.","Thoracodorsal a.","Thoracoacromial a."],answer:1,explanation:"Circumflex scapular a. = subscapular a.의 분지.",type:"짤기"},
{id:204,year:2021,unit:"Upper Limb",q:"손가락 모으기 힘 부족. 손상된 근육은?",choices:["FDP","Ext. digitorum","Lumbrical","Dorsal interossei","Palmar interossei"],answer:4,explanation:"손가락 모으기(adduction) = palmar interossei.",profTip:"항상 나오는 문제입니다!",type:"짤기"},
{id:205,year:2021,unit:"Upper Limb",q:"어깨 외측회전 불가. 손상된 것은?",choices:["Subscapularis","Infraspinatus","Supraspinatus","Teres minor","Teres major"],answer:1,explanation:"Shoulder lat. rotation = infraspinatus > teres minor.",type:"탈기"},
{id:206,year:2021,unit:"Upper Limb",q:"위 환자에게 가장 손상이 큰 신경은?",choices:["Dorsal scapular n.","Suprascapular n.","Upper scapular n.","Lower scapular n.","Axillary n."],answer:1,explanation:"Infraspinatus -> suprascapular n.",type:"탈기"},
{id:207,year:2021,unit:"Back",q:"팔의 힘이 현저히 감소. 손상된 구조는?",choices:["Teres minor-axillary n.","Supraspinatus-suprascapular n.","Latissimus dorsi-thoracodorsal n.","Infraspinatus-suprascapular n.","Rhomboid-dorsal scapular n."],answer:2,explanation:"Latissimus dorsi = thoracodorsal n.",type:"짤기"},
{id:208,year:2021,unit:"Upper Limb",q:"이상이 있을 가능성이 높은 구조물은? (med. epicondyle fracture)",choices:["Ulnar n.","Ulnar collateral a.","Radial n.","Brachial a.","Radial recurrent a."],answer:0,explanation:"Med. epicondyle -> ulnar n.",type:"짤기"},
{id:209,year:2021,unit:"Upper Limb",q:"14세 소년 넘어져서 부상. 손상 가능성 높은 구조는?",choices:["Ext. carpi radialis","Flex. carpi radialis","Opponens policis","Ext. pollicis brevis","Flex. pollicis brevis"],answer:1,explanation:"Scaphoid bone -> FCR.",type:"짤기"},
{id:210,year:2021,unit:"Upper Limb",q:"오른쪽 검지 끝마디가 접혀지지 않음. 마비된 구조물은?",choices:["Ant interosseous n.","Post interosseous n.","Opponens pollicis m.","FDS","Flex. pollicis brevis"],answer:0,explanation:"DIP flexion = FDP -> ant. interosseous n.",type:"짤기"},
{id:211,year:2021,unit:"Upper Limb",q:"Radial a. 혈류 저하 시 증상은?",choices:["Supf. palmar arch 혈류 저하","Flexor retinaculum 표층 맥박 감소","Forearm extensor mm. 혈류 저하","Princeps pollicis a. 혈류 저하","Ant. interosseus a. 혈류 저하"],answer:3,explanation:"Princeps pollicis a. = radial a. 분지.",type:"짤기"},
{id:212,year:2021,unit:"Back",q:"Scapula adduction 검사 시 관련 신경은?",choices:["Axillary n.","Suprascapular n.","Long thoracic n.","Thoracodorsal n.","Dorsal scapular n."],answer:4,explanation:"Rhomboid -> dorsal scapular n.",profTip:"원래는 근육만 물어보셨는데, 이번에는 신경을 물어보셨습니다.",type:"기변"},
{id:213,year:2021,unit:"Upper Limb",q:"손상되었을 가능성이 가장 낮은 것은? (clavicle 분리)",choices:["Pectoralis min.","Biceps short head","Coracobrachialis","Coracoclavicular lig","Coracohumeral lig"],answer:4,explanation:"Coracohumeral lig. = 가장 덜 손상.",type:"짤기"},
{id:214,year:2021,unit:"Back",q:"색칠한 부위 통증. 가장 통증이 많이 발생하는 근육은?",choices:["Latissimus dorsi","Supraspinatus","Rhomboid","Levator scapulae","Trapezius"],answer:2,explanation:"Scapula medial border = rhomboid.",profTip:"원래는 과부하 검사를 하고 대상 근육을 묻는 문제가 주로 출제되었으나 이번에는 정확한 위치를 물음.",type:"기변"},
{id:215,year:2021,unit:"Upper Limb",q:"Axillary a. 분지로 pectoralis minor 위를 주행하는 a.는?",choices:["Dorsal scapular a.","Thoracoacromial a.","Circumflex scapular a.","Suprascapular a.","Thoracodorsal a."],answer:1,explanation:"Thoracoacromial a.",type:"짤기"},
{id:216,year:2021,unit:"Lower Limb",q:"Head of talus 손상. 이상이 생길 수 있는 부위는?",choices:["Transverse arch","Medial longitudinal arch","Lateral longitudinal arch","Tendon of peroneus","Long plantar ligament"],answer:1,explanation:"Head of talus = medial longitudinal arch keystone.",profTip:"BRS에서 교수님이 자주 내시는 문제.",type:"짤기"},
{id:217,year:2021,unit:"Upper Limb",q:"Posterior cord 손상. 마비될 가능성 높은 근육은?",choices:["Supraspinatus","Teres major","Teres minor","Pectoralis major","Latissimus dorsi"],answer:2,explanation:"Axillary n.의 지배 = teres minor.",profTip:"의견이 많이 갈리는 문제. Main branch 기준으로 teres minor.",type:"기변"},
{id:218,year:2021,unit:"Upper Limb",q:"Elbow pain + supination 이상. 손상 신경은?",choices:["Median + ulnar","Axillary + radial","Radial + musculocutaneous","Ulnar + axillary","Median + musculocutaneous"],answer:2,explanation:"Supination = supinator(radial) + biceps(musculocutaneous).",type:"짤기"},
{id:219,year:2021,unit:"Upper Limb",q:"표시된 부위에 통증. 가능성 높은 것은?",choices:["Deltoid","Brachialis","Coracobrachialis","Biceps brachii","Lat. head of triceps"],answer:3,explanation:"Biceps brachii head 부착 부위.",type:"탈기"},
{id:220,year:2021,unit:"Back",q:"Spinoglenoid notch 골절 시 마비될 근육은?",choices:["Supraspinatus + trapezius","Infraspinatus + trapezius","Rhomboid major + trapezius","Rhomboid minor + latissimus dorsi","Subclavius + latissimus dorsi"],answer:1,explanation:"18학번 교수님 확인 답.",type:"짤기"},
{id:221,year:2021,unit:"Back",q:"Suboccipital triangle suboccipital n. 손상 시 영향 적은 것은?",choices:["Rectus capitis post. maj.","Semispinalis capitis","Splenius capitis","Oblique capitis sup.","Oblique capitis inf."],answer:2,explanation:"Splenius capitis = 옆쪽.",type:"짤기"},

const profTips=[
{unit:"Upper Limb",topic:"엄지 Extension vs Abduction",quote:"손을 책상에 딱 대. 엄지만 바닥에서 띄워봐 = extension. 옆으로 벌려봐 = abduction. 이거 절대로 잊어버리면 안 된다.",importance:"critical"},
{unit:"Upper Limb",topic:"FCR/FCU/Palmaris longus 밑 구조물",quote:"FCR 밑 = radial a. / FCU 밑 = ulnar a. / palmaris longus 밑 = median n.",importance:"critical"},
{unit:"Upper Limb",topic:"Brachioradialis 예외",quote:"radial nerve 지배인데 flexor 기능. 유일한 예외!",importance:"critical"},
{unit:"Upper Limb",topic:"ECU 신경지배 함정",quote:"이름에 ulnaris 붙었다고 ulnar nerve라고 쓰면 안 된다. extensor면 radial nerve!",importance:"critical"},
{unit:"Upper Limb",topic:"FDP 신경지배",quote:"외측 2개(검지,중지)는 median nerve 계통, 내측 2개(약지,소지)는 ulnar nerve.",importance:"high"},
{unit:"Upper Limb",topic:"FDS vs FDP 구분",quote:"중간마디에 가있으면 superficialis, 끝마디에 가있으면 profundus.",importance:"high"},
{unit:"Upper Limb",topic:"Wrist drop",quote:"뼈 멀쩡한데 손목 축 처지면 radial nerve! Foot drop이랑 같은 원리.",importance:"critical"},
{unit:"Upper Limb",topic:"Compartment syndrome",quote:"근육 손상 -> 출혈/부종 -> 혈관 압박 -> 2차 허혈. 치료: fasciotomy.",importance:"high"},
{unit:"Upper Limb",topic:"Biceps vs Brachialis 감별",quote:"supination 자세에서 굽히면 biceps+brachialis. pronation(강아지 자세)에서 굽히면 brachialis만.",importance:"high"},
{unit:"Lower Limb",topic:"Hip posterior dislocation",quote:"flexion + medial rotation + adduction (안짱다리). 정복 후 반드시 혈관 확인!",importance:"critical"},
{unit:"Lower Limb",topic:"Medial meniscus + TCL",quote:"내측은 meniscus랑 collateral lig.가 붙어있어. 하나 손상되면 같이. 외측은 떨어져있어.",importance:"critical"},
{unit:"Lower Limb",topic:"충격 반대쪽 손상",quote:"충격받은 반대 방향의 ligament가 끊어진다. 교통사고 = 주로 medial side 손상.",importance:"high"},
{unit:"Lower Limb",topic:"Ant. talofibular lig.",quote:"슬리퍼 끌고 까불다 접질리면 대부분 이거. 제일 중요!",importance:"critical"},
{unit:"Lower Limb",topic:"ACL/PCL 기능",quote:"ACL 끊어지면 앞으로 당기면 빠져나가고, PCL은 뒤로 밀면 빠져나간다.",importance:"high"},
{unit:"Back",topic:"Cauda equina",quote:"spinal cord는 안 자라고 뼈만 자라니까 nerve가 늘어져서 말꼬리 모양. LP는 L4-L5.",importance:"high"},
{unit:"Back",topic:"Rotatores",quote:"수축하면 반대편으로 돌아간다. 오른쪽 수축 = 왼쪽 rotation.",importance:"high"},
{unit:"Back",topic:"Quadratus lumborum",quote:"오래 서있다 허리 아프면 디스크 아니라 이 근육이 약해서. 디스크면 sciatic pain이 있어야.",importance:"high"},
{unit:"Lower Limb",topic:"Femoral nerve NOT in femoral sheath",quote:"femoral nerve는 femoral sheath 안에 없다. 시험에도 자주 나옵니다.",importance:"critical"},
{unit:"Lower Limb",topic:"하지 맥박 촉지 4부위",quote:"femoral, popliteal, post. tibial(med. malleolus 뒤), dorsalis pedis. 국시에 3~4년에 한 번씩 꼭 나옵니다.",importance:"critical"},
{unit:"Lower Limb",topic:"IM injection 안전부위",quote:"둔부 superolateral quadrant. Piriformis 위쪽. 소아는 vastus lateralis에.",importance:"critical"},
{unit:"Lower Limb",topic:"Femoral hernia vs Inguinal hernia",quote:"Femoral hernia는 inguinal lig. 아래, femoral canal을 통해 나온다. Inguinal hernia는 inguinal lig. 위. Femoral hernia는 여성에서 더 흔하고 strangulation 위험이 높다.",importance:"critical"},

function shuffleArray(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function $(id){return document.getElementById(id);}
function escapeHTML(str){return String(str==null?'':str).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}
function getQuestionKey(q){return q.year+'-'+q.id;}
function getVerificationMeta(q){return verificationMeta[getQuestionKey(q)]||null;}
function isExcludedQuestion(q){var meta=getVerificationMeta(q);return !!(meta&&meta.exclude);}
function getVerificationBadgeText(meta){
  if(!meta)return'';
  if(meta.kind==='fixed')return'표준답 수정';
  if(meta.kind==='conflict')return'학교/표준 충돌';
  if(meta.kind==='review')return'이미지 재검수';
  if(meta.kind==='invalid')return'자동 제외';
  return'검수 메모';
}
function buildVerificationHTML(q){
  var meta=getVerificationMeta(q);
  if(!meta)return'';
  var html='<div class="verification-box '+meta.kind+'">';
  html+='<div class="verification-label">'+escapeHTML(getVerificationBadgeText(meta))+'</div>';
  if(meta.summary)html+='<div>'+escapeHTML(meta.summary)+'</div>';
  if(meta.schoolAnswer)html+='<div><strong>학교기출 기준:</strong> '+escapeHTML(meta.schoolAnswer)+'</div>';
  if(meta.standardAnswer)html+='<div><strong>표준 기준:</strong> '+escapeHTML(meta.standardAnswer)+'</div>';
  if(meta.note)html+='<div>'+escapeHTML(meta.note)+'</div>';
  html+='</div>';
  return html;
}
function naturalSortKeys(a,b){
  var na=a.replace(/\D+/g,' ').trim().split(' ').map(Number);
  var nb=b.replace(/\D+/g,' ').trim().split(' ').map(Number);
  for(var i=0;i<Math.max(na.length,nb.length);i++){
    var va=na[i]||0,vb=nb[i]||0;
    if(va!==vb)return va-vb;
  }
  return a.localeCompare(b);
}

function getQuestionImagePages(q){

function getQuestionImageCategory(q){
  if(parseInt(q.year,10)!==2020)return null;
  if(q.unit==='Upper Limb')return 'upper';

  if(q.unit==='Lower Limb'||q.unit==='Back')return 'lower';
  return null;
}
function getQuestionImagePrefixes(q,page){
  if(q.unit==='조직땡')return ['2022_tissue_p'+page];
  var yearKey=String(q.year);
  var prefixes=[yearKey+'_p'+page];
  var category=getQuestionImageCategory(q);
  if(category)prefixes.unshift(yearKey+'_'+category+'_p'+page);
  return prefixes;
}
function resolveQuestionImageKeys(q,data){
  var exact=getExactQuestionImageKeys(q).filter(function(key){
    return Object.prototype.hasOwnProperty.call(data,key);
  });
  if(exact.length)return exact;
  var found=[];
  getQuestionImagePages(q).forEach(function(page){
    getQuestionImagePrefixes(q,page).forEach(function(prefix){
      Object.keys(data).forEach(function(key){
        if(key===prefix||key.indexOf(prefix+'_')===0)found.push(key);
      });
    });
  });
  return found.filter(function(key,index,arr){return arr.indexOf(key)===index;}).sort(naturalSortKeys);
}
function hasQuestionImage(q){
  return getExactQuestionImageKeys(q).length>0||getQuestionImagePages(q).length>0;
}
function openImageSet(data,keys,startIndex){
  imgViewerState.allData=data;
  imgViewerState.keys=keys;
  openImageViewer(startIndex||0);
}
function fillImageWrap(wrap,data,keys,imageClass){
  wrap.innerHTML='';
  wrap.classList.remove('hidden');
  keys.forEach(function(key,idx){
    var img=document.createElement('img');
    img.className=imageClass;
    img.loading='lazy';
    img.src='data:image/jpeg;base64,'+data[key];
    img.alt=key;
    img.addEventListener('click',function(){openImageSet(data,keys,idx);});
    wrap.appendChild(img);
  });
}

function getImgFile(year){
  var y=parseInt(year);
  if(y===2020) return 'img_2020.json';
  if(y===2021) return 'img_2021.json';
  if(y===2022) return 'img_2022.json';
  if(y===2023) return 'img_2023.json';
  return null;
}
function getImgFileForQuestion(q){
  if(q&&q.unit==='조직땡')return 'img_tissue_2022.json';
  return getImgFile(q?q.year:null);
}

function loadImages(year, cb){
  var file=getImgFile(year);
  if(!file){cb(null);return;}
  if(imgCache[file]){cb(imgCache[file]);return;}
  fetch(file).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    imgCache[file]=data;
    cb(data);
  }).catch(function(e){
    console.error('Image load error:',e);
    cb(null);
  });
}
function loadImagesForQuestion(q,cb){
  var file=getImgFileForQuestion(q);
  if(!file){cb(null);return;}
  if(imgCache[file]){cb(imgCache[file]);return;}
  fetch(file).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    imgCache[file]=data;
    cb(data);
  }).catch(function(e){
    console.error('Image load error:',e);
    cb(null);
  });
}

  var loading=$('img-modal-loading');
  $('img-modal-title').textContent=year+'년 기출 사진';
  grid.innerHTML='';
  loading.classList.remove('hidden');
  overlay.classList.add('open');
  document.body.style.overflow='hidden';

  // Push history state for back button
  history.pushState({imgModal:true},'');

  loadImages(year, function(data){
    loading.classList.add('hidden');
    if(!data){grid.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)">이미지를 불러올 수 없습니다.</div>';return;}
    // Filter keys for this year
    var prefix=String(year);
    var keys=Object.keys(data).filter(function(k){return k.indexOf(prefix)===0;}).sort(naturalSortKeys);
    if(keys.length===0){grid.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2)">해당 연도의 이미지가 없습니다.</div>';return;}

    // Store for viewer
    imgViewerState.allData=data;
    imgViewerState.keys=keys;

    keys.forEach(function(key, idx){
      var wrap=document.createElement('div');
      wrap.className='img-thumb-wrap';
      var img=document.createElement('img');
      img.loading='lazy';
      img.src='data:image/jpeg;base64,'+data[key];
      img.alt=key;
      var label=document.createElement('div');
      label.className='img-thumb-label';
      // Make label readable
      var labelText=key.replace(prefix+'_','').replace(/_/g,' ');
      label.textContent=labelText;
      wrap.appendChild(img);
      wrap.appendChild(label);
      wrap.setAttribute('data-idx',String(idx));
      wrap.addEventListener('click',function(){openImageViewer(idx);});
      grid.appendChild(wrap);
    });
  });
}

function closeImageModal(){
  var overlay=$('img-modal-overlay');
  if(overlay.classList.contains('open')){
    overlay.classList.remove('open');
    document.body.style.overflow='';
  }
}

function openImageViewer(idx){
  imgViewerState.current=idx;
  var viewer=$('img-viewer-overlay');
  viewer.classList.add('open');
  updateImageViewer();
  // Push state for back
  history.pushState({imgViewer:true},'');
}

function closeImageViewer(){
  var viewer=$('img-viewer-overlay');
  if(viewer.classList.contains('open')){
    viewer.classList.remove('open');
  }
}

function updateImageViewer(){
  var idx=imgViewerState.current;
  var keys=imgViewerState.keys;
  var data=imgViewerState.allData;
  if(!keys||!keys[idx])return;
  $('img-viewer-img').src='data:image/jpeg;base64,'+data[keys[idx]];
  $('img-viewer-label').textContent=keys[idx]+' ('+(idx+1)+'/'+keys.length+')';
  $('img-viewer-prev').disabled=(idx<=0);
  $('img-viewer-next').disabled=(idx>=keys.length-1);
}

// Image modal event listeners
$('img-modal-close').addEventListener('click',function(){
  closeImageModal();
  // Remove pushed history state
  if(history.state && history.state.imgModal) history.back();
});
$('img-viewer-close').addEventListener('click',function(){
  closeImageViewer();
  if(history.state && history.state.imgViewer) history.back();
});
$('img-viewer-prev').addEventListener('click',function(){
  if(imgViewerState.current>0){imgViewerState.current--;updateImageViewer();}
});
$('img-viewer-next').addEventListener('click',function(){
  if(imgViewerState.current<imgViewerState.keys.length-1){imgViewerState.current++;updateImageViewer();}
});

// Swipe support for image viewer
(function(){
  var startX=0,startY=0,tracking=false;
  var viewer=$('img-viewer-overlay');
  viewer.addEventListener('touchstart',function(e){
    if(e.touches.length===1){startX=e.touches[0].clientX;startY=e.touches[0].clientY;tracking=true;}
  },{passive:true});
  viewer.addEventListener('touchend',function(e){
    if(!tracking)return;
    tracking=false;
    var endX=e.changedTouches[0].clientX;
    var endY=e.changedTouches[0].clientY;
    var dx=endX-startX, dy=endY-startY;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0 && imgViewerState.current<imgViewerState.keys.length-1){imgViewerState.current++;updateImageViewer();}
      else if(dx>0 && imgViewerState.current>0){imgViewerState.current--;updateImageViewer();}
    }
  },{passive:true});
})();

// ESC key and back button handling
window.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if($('img-viewer-overlay').classList.contains('open')){closeImageViewer();if(history.state&&history.state.imgViewer)history.back();return;}
    if($('img-modal-overlay').classList.contains('open')){closeImageModal();if(history.state&&history.state.imgModal)history.back();return;}
  }
  // Arrow keys in viewer
  if($('img-viewer-overlay').classList.contains('open')){
    if(e.key==='ArrowLeft'&&imgViewerState.current>0){imgViewerState.current--;updateImageViewer();}
    if(e.key==='ArrowRight'&&imgViewerState.current<imgViewerState.keys.length-1){imgViewerState.current++;updateImageViewer();}
  }
});
window.addEventListener('popstate',function(e){
  if($('img-viewer-overlay').classList.contains('open')){closeImageViewer();return;}
  if($('img-modal-overlay').classList.contains('open')){closeImageModal();return;}
});

});

function getConfusedList(key){
  try{var raw=localStorage.getItem(key);return raw?JSON.parse(raw):[];}
  catch(e){return [];}
}
function setConfusedList(key,arr){
  try{localStorage.setItem(key,JSON.stringify(arr));}
  catch(e){}
}
function toggleConfused(key,val){
  var list=getConfusedList(key);
  var idx=list.indexOf(val);
  if(idx>=0){list.splice(idx,1);}else{list.push(val);}
  setConfusedList(key,list);
  return idx<0; // true = now confused
}
function isConfused(key,val){
  return getConfusedList(key).indexOf(val)>=0;
}

// ========== QUIZ ENGINE ==========
let quizState={questions:[],current:0,answers:{},score:0,answered:0};

function startQuiz(qs){
  quizState={questions:qs,current:0,answers:{},score:0,answered:0};
  $('quiz-setup').classList.add('hidden');
  $('quiz-result').classList.add('hidden');
  $('quiz-area').classList.remove('hidden');
  renderQuestion();
}

function renderQuestionImages(q){
  var wrap=$('q-image-wrap');
  var token=++quizImageRenderToken;
  wrap.innerHTML='';
  wrap.classList.add('hidden');
  if(!hasQuestionImage(q))return;
  wrap.classList.remove('hidden');
  wrap.innerHTML='<div class="q-image-note">이미지 로딩 중...</div>';
  loadImagesForQuestion(q,function(data){
    if(token!==quizImageRenderToken)return;
    if(!data){wrap.innerHTML='<div class="q-image-note">이미지를 불러오지 못했습니다.</div>';return;}
    var keys=resolveQuestionImageKeys(q,data);
    if(keys.length===0){
      wrap.innerHTML='<div class="q-image-note">이 문제에 연결된 이미지를 찾지 못했습니다.</div>';
      return;
    }
    fillImageWrap(wrap,data,keys,'q-inline-image');
  });
}

function renderQuestion(){
  const q=quizState.questions[quizState.current];
  if(!q){console.error('renderQuestion: no question at index',quizState.current);return;}
  const verifyMeta=getVerificationMeta(q);
  const total=quizState.questions.length;
  $('q-counter').textContent=(quizState.current+1)+' / '+total;
  $('q-score').textContent='\uc815\ub2f5: '+quizState.score+' / '+quizState.answered;
  $('progress-fill').style.width=((quizState.current+1)/total*100)+'%';
  $('q-year').textContent=q.year+'\uae30\ucd9c';
  $('q-year').style.cssText='background:rgba(100,140,245,0.15);color:#6c8ef5';
  $('q-unit').textContent=q.unit;
  $('q-unit').style.cssText='background:rgba(34,197,94,0.12);color:var(--success)';
  $('q-type').textContent=q.type;
  var typeColors={'\uc9e4\uae30':'background:rgba(34,197,94,0.15);color:#22c55e','\uae30\ubcc0':'background:rgba(234,179,8,0.15);color:#eab308','\ud0c8\uae30':'background:rgba(239,68,68,0.15);color:#ef4444','\uc608\uc0c1':'background:rgba(168,85,247,0.15);color:#a855f7'};
  $('q-type').style.cssText=typeColors[q.type]||'background:rgba(124,108,240,0.18);color:var(--accent)';
  var verifyBadge=$('q-verify-badge');
  if(verifyMeta){
    verifyBadge.textContent=getVerificationBadgeText(verifyMeta);
    verifyBadge.className='q-badge verify '+verifyMeta.kind;
  }else{
    verifyBadge.textContent='';
    verifyBadge.className='q-badge verify hidden';
  }
  $('q-num').textContent='Q'+q.id;

  // Confused button in quiz
  var existingCBtn=document.getElementById('q-confused-btn');
  if(existingCBtn)existingCBtn.remove();
  var cBtn=document.createElement('button');
  cBtn.id='q-confused-btn';
  cBtn.className='confused-btn'+(isConfused('confused_quiz',q.id)?' active':'');
  cBtn.innerHTML='&#9733;';
  cBtn.title='헷갈림 표시';
  cBtn.setAttribute('data-qid',q.id);
  $('q-num').parentNode.insertBefore(cBtn,$('q-num').nextSibling);

  $('q-text').textContent=q.q;
  renderQuestionImages(q);

  // Image browse button
  var existingImgBtn=document.getElementById('q-img-browse-btn');
  if(existingImgBtn)existingImgBtn.remove();
  var imgFile=getImgFile(q.year);
  if(imgFile&&q.unit!=='조직땡'){
    var imgBtn=document.createElement('button');
    imgBtn.id='q-img-browse-btn';
    imgBtn.className='btn-img-browse';
    imgBtn.innerHTML='&#128247; '+q.year+'년 전체 이미지 보기';
    imgBtn.setAttribute('data-year',String(q.year));
    imgBtn.addEventListener('click',function(){showImageModal(parseInt(this.getAttribute('data-year')));});
    $('q-text').parentNode.insertBefore(imgBtn,$('choices'));
  }

  const choicesEl=$('choices');
  choicesEl.innerHTML='';
  q.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML='<span class="choice-num">'+(i+1)+'</span>'+c;
    const prev=quizState.answers[quizState.current];
    if(prev!==undefined){
      btn.classList.add('answered');
      if(i===q.answer){
        btn.classList.add(prev===q.answer?'correct':'show-correct');
        btn.classList.add('mark-correct');
      }
      if(i===prev&&prev!==q.answer){
        btn.classList.add('wrong');
        btn.classList.add('mark-wrong');
      }
    } else {
      btn.addEventListener('click',()=>selectAnswer(i));
    }
    choicesEl.appendChild(btn);
  });

  const expEl=$('explanation');
  if(quizState.answers[quizState.current]!==undefined){
    expEl.innerHTML='<strong>\ud574\uc124:</strong> '+q.explanation;
    if(q.profTip)expEl.innerHTML+='<div class="prof-tip">'+q.profTip+'</div>';
    expEl.innerHTML+=buildVerificationHTML(q);
    expEl.classList.add('show');
  } else {
    expEl.classList.remove('show');
    expEl.innerHTML='';
  }

  $('prev-btn').disabled=quizState.current===0;
  $('next-btn').textContent=quizState.current===total-1?'\uacb0\uacfc \ubcf4\uae30':'Next \u2192';
}

function selectAnswer(idx){
  if(quizState.answers[quizState.current]!==undefined)return;
  const q=quizState.questions[quizState.current];
  quizState.answers[quizState.current]=idx;
  quizState.answered++;
  if(idx===q.answer)quizState.score++;
  renderQuestion();
}

$('prev-btn').addEventListener('click',()=>{
  if(quizState.current>0){quizState.current--;renderQuestion();}
});
$('next-btn').addEventListener('click',()=>{
  if(quizState.current<quizState.questions.length-1){quizState.current++;renderQuestion();}
  else showResult();
});

$('start-quiz').addEventListener('click',function(){
  try{
  var year=$('year-filter').value;
  var unit=$('unit-filter').value;
  var count=parseInt($('count-filter').value);
  var shuffle=$('shuffle-toggle').checked;
  var qs=[].concat(allQuestions).filter(function(q){return !isExcludedQuestion(q);});
  // Default sort: 2023 first
  qs.sort((a,b)=>b.year-a.year);
  if(year!=='all')qs=qs.filter(q=>q.year===parseInt(year));
  if(unit!=='all')qs=qs.filter(q=>q.unit===unit);
  var tf=document.getElementById('type-filter');
  if(tf && tf.value==='조직땡'){
    qs=qs.filter(function(q){return q.unit==='조직땡';});
  } else if(tf && tf.value==='빈출'){
    // 빈출: 동일 정답 2회 이상 + 최소 1회는 2021년 이후 + 각 그룹 최신 1개만
    var ansGroups={};
    var nonTissue=qs.filter(function(q){return q.unit!=='조직땡';});
    nonTissue.forEach(function(q){
      var key=(q.choices[q.answer]||'').toLowerCase().replace(/[^a-z가-힣\.\s]/g,'').trim();
      if(key.length>3){if(!ansGroups[key])ansGroups[key]=[];ansGroups[key].push(q);}
    });
    var freqQs=[];
    for(var k in ansGroups){
      var grp=ansGroups[k];
      if(grp.length<2)continue;
      var hasRecent=grp.some(function(q){return q.year>=2021;});
      if(!hasRecent)continue;
      // (n+1)/2개만 포함 (최신 우선)
      grp.sort(function(a,b){return b.year-a.year;});
      var take=Math.ceil((grp.length+1)/2);
      for(var i=0;i<take&&i<grp.length;i++){freqQs.push(grp[i]);}
    }
    qs=freqQs;
  } else if(tf && tf.value!=='all'){
    qs=qs.filter(function(q){return q.type===tf.value&&q.unit!=='조직땡';});
  } else {
    if(unit!=='조직땡'){
      qs=qs.filter(function(q){return q.unit!=='조직땡';});
    }
  }
  var confusedOnly=$('confused-only-toggle').checked;
  if(confusedOnly){
    var confList=getConfusedList('confused_quiz');
    qs=qs.filter(function(q){return confList.indexOf(q.id)>=0;});
  }

  if(shuffle)qs=shuffleArray(qs);
  if(count>0)qs=qs.slice(0,count);
  if(qs.length===0){alert('해당 조건에 문제가 없습니다.');return;}
  startQuiz(qs);
  }catch(e){alert('오류: '+e.message);}
});

function showResult(){
  $('quiz-area').classList.add('hidden');
  $('quiz-result').classList.remove('hidden');
  const total=quizState.questions.length;
  const pct=Math.round(quizState.score/total*100);
  $('result-pct').textContent=pct+'%';
  $('result-detail').textContent=quizState.score+' / '+total+' \uc815\ub2f5';

  const unitStats={};
  quizState.questions.forEach((q,i)=>{
    if(!unitStats[q.unit])unitStats[q.unit]={correct:0,total:0};
    unitStats[q.unit].total++;
    if(quizState.answers[i]===q.answer)unitStats[q.unit].correct++;
  });
  const donutWrap=$('donut-chart');
  donutWrap.innerHTML='';
  Object.entries(unitStats).forEach(([unit,s])=>{
    const p=Math.round(s.correct/s.total*100);
    const color=p>=80?'var(--success)':p>=50?'var(--warning)':'var(--danger)';
    const deg=p*3.6;
    const item=document.createElement('div');
    item.className='donut-item';
    item.innerHTML='<div class="donut" style="background:conic-gradient('+color+' '+deg+'deg, var(--border) '+deg+'deg)"><span class="pct">'+p+'%</span></div><div class="label">'+unit+'<br>'+s.correct+'/'+s.total+'</div>';
    donutWrap.appendChild(item);
  });

  const wrongList=$('wrong-list');
  wrongList.innerHTML='<div class="card-title" style="margin-bottom:12px;">\ud2c0\ub9b0 \ubb38\uc81c</div>';
  let wrongQs=[];
  quizState.questions.forEach((q,i)=>{
    if(quizState.answers[i]!==q.answer){
      wrongQs.push(q);
      const div=document.createElement('div');
      div.className='wrong-item';
      div.innerHTML='<div class="wi-q">Q'+q.id+'. '+q.q+'</div><div class="wi-a">\u2192 \uc815\ub2f5: '+q.choices[q.answer]+'</div>';
      wrongList.appendChild(div);
    }
  });
  if(wrongQs.length===0)wrongList.innerHTML+='<div style="color:var(--success);text-align:center;padding:16px;">\uc804\ubd80 \ub9de\uc558\uc2b5\ub2c8\ub2e4!</div>';

  $('retry-wrong').onclick=()=>{
    if(wrongQs.length===0){alert('\ud2c0\ub9b0 \ubb38\uc81c\uac00 \uc5c6\uc2b5\ub2c8\ub2e4!');return;}
    startQuiz(shuffleArray(wrongQs));
  };
}

  $('quiz-setup').classList.remove('hidden');
});
