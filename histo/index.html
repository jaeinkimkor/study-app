      </div>
    </div>
  `;
  }).join('');
  document.getElementById('chapterList').style.display = 'block';
  document.getElementById('chapterDetail').style.display = 'none';
}

function openChapter(catId) {
  chapterViewActive = true;
  chapterQuestions = ALL_QUESTIONS.filter(q => (q.category || '기타') === catId);
  chapterQIdx = 0;
  document.getElementById('chapterList').style.display = 'none';
  document.getElementById('chapterDetail').style.display = 'block';
  renderChapterQuestion(catId);
}

// Dopan gallery view for a category
function showDopanGallery(catId) {
  const dopans = getDopansByCategory(catId);
  if (!dopans.length) return;
  const mc = document.getElementById('modalContent');
  mc.innerHTML = `
    <div class="modal-title">도판 갤러리 - ${catId}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${dopans.length}장</div>
    <div class="dopan-grid">
      ${dopans.map(f => `<img loading="lazy" src="img/dopan/${encodeURIComponent(f)}" alt="${f}" onclick="event.stopPropagation();openImgViewer('img/dopan/${encodeURIComponent(f)}')" onerror="this.style.display='none'">`).join('')}
    </div>
  `;
  openModal();
}

function renderChapterQuestion(catId) {
  if (!chapterQuestions.length) {
    document.getElementById('chapterDetail').innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="backToChapters()" style="margin-bottom:12px">&larr; 단원 목록</button>
      <div class="empty-state"><div class="empty-text">문제가 없습니다</div></div>
    `;
    return;
  }
  const q = chapterQuestions[chapterQIdx];
  const total = chapterQuestions.length;
  const pct = ((chapterQIdx + 1) / total * 100).toFixed(0);
  const isStar = starIds.includes(q.id);
  const hasResult = doneIds[q.id];

  const imgHtml = q.images && q.images.length
    ? q.images.map(img => `<img loading="lazy" src="img/${img}" alt="" onclick="event.stopPropagation();openImgViewer('img/${img}')" onerror="this.style.display='none'">`).join('')
    : '<div style="color:var(--text3);font-size:14px">이미지 없음</div>';

  let koExtra = q.answer_ko || '';
  if (!koExtra && q.answer_text) {
    const parts = q.answer_text.split(',').map(s => s.trim());
    const translated = parts.map(p => TERMS[p] || '').filter(Boolean);
    if (translated.length) koExtra = translated.join(', ');
  }

  // Get dopan images for this category
  const catDopans = getDopansByCategory(catId);
  const dopanSection = catDopans.length ? `
    <div class="dopan-section">
      <div class="dopan-section-title">&#128444; 도판 자료 (${catDopans.length}장)
        <button class="btn btn-outline btn-sm" onclick="showDopanGallery('${catId}')" style="margin-left:auto">전체보기</button>
      </div>
      <div class="dopan-grid">
        ${catDopans.slice(0, 4).map(f => `<img loading="lazy" src="img/dopan/${encodeURIComponent(f)}" alt="${f}" onclick="openImgViewer('img/dopan/${encodeURIComponent(f)}')" onerror="this.style.display='none'">`).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('chapterDetail').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="backToChapters()" style="margin-bottom:12px">&larr; 단원 목록</button>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">${chapterQIdx+1} / ${total}</div>
    <div class="q-card card">
      <div class="q-card-inner">
      <div class="q-img-wrap">${imgHtml}</div>
      <div class="q-body">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div class="q-num">${q.year}년 #${q.question_num} [${q.category}]</div>
          <button class="star-btn ${isStar?'active':''}" onclick="toggleStar(${q.id});renderChapterQuestion('${catId}')">${isStar?'&#9733;':'&#9734;'}</button>
        </div>
        <div class="q-text">${q.question_text}</div>
        <div class="q-answer" id="chAnswer_${q.id}">
          <div class="q-answer-en">${q.answer_text}</div>
          ${koExtra ? '<div class="q-answer-ko">' + koExtra + '</div>' : ''}
        </div>
        <button class="btn btn-primary btn-block" id="chShowBtn_${q.id}" onclick="document.getElementById('chAnswer_${q.id}').classList.add('show');document.getElementById('chEval_${q.id}').style.display='flex';this.style.display='none'">정답 보기</button>
        <div class="btn-row" id="chEval_${q.id}" style="display:none">
          <button class="btn btn-green" onclick="evalChapter(${q.id},'O','${catId}')">&#9898; 맞았다</button>
          <button class="btn btn-red" onclick="evalChapter(${q.id},'X','${catId}')">&#10060; 틀렸다</button>
        </div>
        ${hasResult ? `<div style="text-align:center;margin-top:8px;font-size:13px;color:${hasResult==='O'?'var(--green)':'var(--red)'}">이전 결과: ${hasResult}</div>` : ''}
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-outline btn-sm" onclick="chapterQIdx=Math.max(0,chapterQIdx-1);renderChapterQuestion('${catId}')" ${chapterQIdx===0?'disabled':''}>&larr; 이전</button>
          <button class="btn btn-outline btn-sm" onclick="chapterQIdx=Math.min(chapterQuestions.length-1,chapterQIdx+1);renderChapterQuestion('${catId}')" ${chapterQIdx>=total-1?'disabled':''}>다음 &rarr;</button>
        </div>
      </div>
      </div>
    </div>
    ${dopanSection}
  `;
}

function evalChapter(id, result, catId) {
  doneIds[id] = result;
  setStore('done', doneIds);
  if (result === 'X') {
    if (!wrongIds.includes(id)) { wrongIds.push(id); setStore('wrong', wrongIds); }
  } else {
    wrongIds = wrongIds.filter(x => x !== id);
    setStore('wrong', wrongIds);
  }
  if (chapterQIdx >= chapterQuestions.length - 1) {
    const done = chapterQuestions.filter(q => doneIds[q.id]).length;
    const correct = chapterQuestions.filter(q => doneIds[q.id] === 'O').length;
    document.getElementById('chapterQArea').innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:48px;margin-bottom:16px">&#127881;</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">단원 학습 완료!</div>
        <div style="color:var(--text2);margin-bottom:16px">${chapterQuestions.length}문제 중 ${correct}문제 정답 (${Math.round(correct/chapterQuestions.length*100)}%)</div>
        <button class="btn btn-primary" onclick="backToChapters()">단원 목록으로</button>
      </div>`;
    return;
  }
  chapterQIdx++;
  renderChapterQuestion(catId);
  scrollTop();
}

function backToChapters() {
  chapterViewActive = false;
  renderChapters();
}

// === TIPS TAB ===
let tipCatFilter = 'all';

function renderTips() {
  const cats = ['all', ...new Set(TIPS.map(t => t.category))];
  document.getElementById('tipCatFilter').innerHTML = cats.map(c =>
    `<button class="filter-chip ${tipCatFilter===c?'active':''}" onclick="tipCatFilter='${c}';renderTips()">${c==='all'?'전체':c}</button>`
  ).join('');

  let items = tipCatFilter === 'all' ? TIPS : TIPS.filter(t => t.category === tipCatFilter);
  // Sort by importance
  const impOrder = {S: 0, A: 1, B: 2, C: 3};
  items.sort((a, b) => (impOrder[a.importance] || 9) - (impOrder[b.importance] || 9));

  document.getElementById('tipList').innerHTML = items.map(function(t) {
    // 관련 기출에서 이미지 있는 것 찾기
    var relatedImgs = [];
    if (t.related_organs) {
      t.related_organs.forEach(function(o) {
        ALL_QUESTIONS.forEach(function(q) {
          if (relatedImgs.length < 4 && q.images && q.images.length &&
              ((q.organ && q.organ.toLowerCase() === o.toLowerCase()) ||
               (q.answer_text && q.answer_text.toLowerCase().includes(o.toLowerCase())))) {
            relatedImgs.push({src: 'img/' + q.images[0], label: q.answer_text || o});
          }
        });
        // 도판에서도 찾기
        if (typeof DOPAN_FILES !== 'undefined') {
          DOPAN_FILES.forEach(function(f) {
            if (relatedImgs.length < 4 && f.toLowerCase().includes(o.toLowerCase())) {
              relatedImgs.push({src: 'img/dopan/' + encodeURIComponent(f), label: f.replace('.JPG','')});
            }
          });
        }
      });
    }
    var imgGrid = relatedImgs.length ? '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">' +
      relatedImgs.slice(0,4).map(function(im) {
        return '<div style="text-align:center"><img loading="lazy" src="' + im.src + '" style="width:100%;height:80px;object-fit:contain;border-radius:8px;background:var(--bg3);cursor:zoom-in" onclick="event.stopPropagation();openImgViewer(\'' + im.src + '\')" loading="lazy" onerror="this.parentElement.style.display=\'none\'"><div style="font-size:10px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + im.label.substring(0,25) + '</div></div>';
      }).join('') + '</div>' : '';
    return '<div class="tip-card">' +
      '<div class="tip-header"><span class="rank rank-' + t.importance + '">' + t.importance + '</span><span class="tip-topic">' + t.topic + '</span></div>' +
      '<div class="tip-body">' + t.tip + '</div>' +
      imgGrid +
      '<div class="tip-meta"><span class="tip-tag">' + t.category + '</span>' +
      (t.related_organs ? t.related_organs.map(function(o){return '<span class="tip-tag">'+o+'</span>'}).join('') : '') +
      '</div>' +
      (t.related_organs ? '<button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="showTipRelated(' + t.id + ')">관련 기출 보기</button>' : '') +
    '</div>';
  }).join('');
}

function showTipRelated(tipId) {
  const tip = TIPS.find(t => t.id === tipId);
  if (!tip || !tip.related_organs) return;
  const related = ALL_QUESTIONS.filter(q =>
    tip.related_organs.some(o =>
      (q.organ && q.organ.toLowerCase() === o.toLowerCase()) ||
      (q.answer_text && q.answer_text.toLowerCase().includes(o.toLowerCase()))
    )
  );
  const mc = document.getElementById('modalContent');
  mc.innerHTML = `
    <div class="modal-title">${tip.topic} - 관련 기출</div>
    <div style="color:var(--text2);font-size:13px;margin-bottom:12px">${related.length}문제</div>
    ${related.length ? related.map(q => `
      <div class="list-item" onclick="closeModal({target:document.getElementById('modalOverlay')});goToQuestion(${q.id})">
        <div class="list-item-body">
          <div class="list-item-title">${q.answer_text}</div>
          <div class="list-item-sub">${q.year}년 #${q.question_num} ${q.answer_ko||''}</div>
        </div>
        <div class="list-item-right">&#8250;</div>
      </div>
    `).join('') : '<div class="empty-state"><div class="empty-text">관련 문제가 없습니다</div></div>'}
  `;
  openModal();
}

// === RECORDS TAB ===
let recMode = 'stats';

function renderRecords() {
  const modes = [
    {id:'stats', label:'통계'},
    {id:'wrong', label:'오답노트'},
    {id:'stars', label:'즐겨찾기'},
  ];
  document.getElementById('recFilter').innerHTML = modes.map(m =>
    `<button class="filter-chip ${recMode===m.id?'active':''}" onclick="recMode='${m.id}';renderRecords()">${m.label}</button>`
  ).join('');

  const el = document.getElementById('recContent');

  if (recMode === 'stats') {
    const total = ALL_QUESTIONS.length;
    const attempted = Object.keys(doneIds).length;
    const correct = Object.values(doneIds).filter(v => v === 'O').length;
    const wrong = Object.values(doneIds).filter(v => v === 'X').length;
    const pct = attempted ? Math.round(correct / attempted * 100) : 0;

    // Per-category stats
    const catStats = {};
    ALL_QUESTIONS.forEach(q => {
      const c = q.category || '기타';
      if (!catStats[c]) catStats[c] = {total: 0, done: 0, correct: 0};
      catStats[c].total++;
      if (doneIds[q.id]) {
        catStats[c].done++;
        if (doneIds[q.id] === 'O') catStats[c].correct++;
      }
    });

    const catRows = Object.entries(catStats)
      .sort((a, b) => {
        const rateA = a[1].done ? a[1].correct / a[1].done : 0;
        const rateB = b[1].done ? b[1].correct / b[1].done : 0;
        return rateA - rateB;
      })
      .map(([cat, s]) => {
        const rate = s.done ? Math.round(s.correct / s.done * 100) : 0;
        const color = rate >= 80 ? 'var(--green)' : rate >= 50 ? 'var(--yellow)' : 'var(--red)';
        return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="width:70px;font-size:13px;flex-shrink:0">${cat}</span>
            <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
              <div style="width:${rate}%;height:100%;background:${color};border-radius:4px"></div>
            </div>
            <span style="width:50px;text-align:right;font-size:12px;color:var(--text2)">${rate}%</span>
          </div>
        `;
      }).join('');

    // Find weakest category
    const sortedCats = Object.entries(catStats)
      .filter(([,s]) => s.done >= 2)
      .sort((a, b) => {
        const rateA = a[1].done ? a[1].correct / a[1].done : 0;
        const rateB = b[1].done ? b[1].correct / b[1].done : 0;
        return rateA - rateB;
      });
    const weakest = sortedCats.length ? sortedCats[0] : null;
    const weakestRate = weakest ? Math.round(weakest[1].correct / weakest[1].done * 100) : 0;

    // Action buttons
    const actionBtns = `
      <div class="rec-action-grid">
        ${weakest ? `<div class="rec-action-btn" onclick="startWeakPractice('${weakest[0].replace(/'/g,"\\'")}')">
          <div class="rec-action-icon">&#127919;</div>
          <div class="rec-action-title">취약 단원 연습</div>
          <div class="rec-action-desc">${weakest[0]} (${weakestRate}%) 집중 풀기</div>
        </div>` : ''}
        ${wrongIds.length ? `<div class="rec-action-btn" onclick="startWrongReview()">
          <div class="rec-action-icon">&#128260;</div>
          <div class="rec-action-title">오답 연속 풀기</div>
          <div class="rec-action-desc">${wrongIds.length}문제 순서대로</div>
        </div>` : ''}
        ${wrongIds.length >= 5 ? `<div class="rec-action-btn" onclick="startWrongMiniExam()">
          <div class="rec-action-icon">&#128221;</div>
          <div class="rec-action-title">틀린 문제 재시험</div>
          <div class="rec-action-desc">오답 ${Math.min(20, wrongIds.length)}문제 미니 모의고사</div>
        </div>` : ''}
        <div class="rec-action-btn" onclick="showWelcome()">
          <div class="rec-action-icon">&#128218;</div>
          <div class="rec-action-title">학습 가이드</div>
          <div class="rec-action-desc">처음부터 다시 안내</div>
        </div>
      </div>
    `;

    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">${attempted}</div><div class="stat-label">풀은 문제</div></div>
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체 문제</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--green)">${pct}%</div><div class="stat-label">정답률</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--red)">${wrongIds.length}</div><div class="stat-label">오답</div></div>
      </div>
      <div class="progress-bar" style="height:6px;margin-bottom:4px">
        <div class="progress-fill" style="width:${Math.round(attempted/total*100)}%"></div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:20px">전체 진행률 ${Math.round(attempted/total*100)}%</div>
      ${actionBtns}
      <div style="font-size:15px;font-weight:700;margin-bottom:12px">단원별 정답률 (취약 순)</div>
      ${catRows}
      <button class="btn btn-red btn-block" style="margin-top:24px" onclick="if(confirm('모든 학습 기록을 초기화하시겠습니까?')&&confirm('정말 삭제합니까? 이 작업은 되돌릴 수 없습니다.')){wrongIds=[];starIds=[];doneIds={};setStore('wrong',[]);setStore('stars',[]);setStore('done',{});renderRecords()}">데이터 초기화</button>
    `;
  } else if (recMode === 'wrong') {
    const wqs = ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
    if (!wqs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9989;</div><div class="empty-text">오답이 없습니다!</div></div>';
      return;
    }
    el.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div style="font-size:13px;color:var(--text2);flex:1;align-self:center">${wqs.length}문제</div>
        <button class="btn btn-primary btn-sm" onclick="startWrongReview()">&#128260; 연속 풀기</button>
        ${wqs.length >= 5 ? '<button class="btn btn-red btn-sm" onclick="startWrongMiniExam()">&#128221; 재시험</button>' : ''}
      </div>
      ${wqs.map(q => `
        <div class="list-item" onclick="goToQuestion(${q.id})">
          <div class="list-item-body">
            <div class="list-item-title">${q.answer_text}</div>
            <div class="list-item-sub">${q.year}년 #${q.question_num} [${q.category}] ${q.answer_ko||''}</div>
          </div>
          <div class="list-item-right">&#8250;</div>
        </div>
      `).join('')}
    `;
  } else if (recMode === 'stars') {
    const sqs = ALL_QUESTIONS.filter(q => starIds.includes(q.id));
    if (!sqs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9734;</div><div class="empty-text">즐겨찾기가 없습니다</div></div>';
      return;
    }
    el.innerHTML = `
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${sqs.length}문제</div>
      ${sqs.map(q => `
        <div class="list-item" onclick="goToQuestion(${q.id})">
          <div class="list-item-body">
            <div class="list-item-title">${q.answer_text}</div>
            <div class="list-item-sub">${q.year}년 #${q.question_num} [${q.category}] ${q.answer_ko||''}</div>
          </div>
          <button class="star-btn active" onclick="event.stopPropagation();toggleStar(${q.id});renderRecords()">&#9733;</button>
        </div>
      `).join('')}
    `;
  }
}

// === REVIEW FUNCTIONS ===
function startWeakPractice(catId) {
  const qs = ALL_QUESTIONS.filter(q => (q.category || '기타') === catId);
  if (!qs.length) return;
  switchTab(5);
  setTimeout(() => openChapter(catId), 100);
}

function startWrongReview() {
  const wqs = ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
  if (!wqs.length) return;
  // Use chapter-style review
  chapterViewActive = true;
  chapterQuestions = shuffle([...wqs]);
  chapterQIdx = 0;
  switchTab(5);
  document.getElementById('chapterList').style.display = 'none';
  document.getElementById('chapterDetail').style.display = 'block';
  renderWrongReviewQuestion();
}

function renderWrongReviewQuestion() {
  if (!chapterQuestions.length) {
    document.getElementById('chapterDetail').innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="backToChapters()" style="margin-bottom:12px">&larr; 돌아가기</button>
      <div class="empty-state"><div class="empty-text">문제가 없습니다</div></div>
    `;
    return;
  }
  const q = chapterQuestions[chapterQIdx];
  const total = chapterQuestions.length;
  const pct = ((chapterQIdx + 1) / total * 100).toFixed(0);
  const isStar = starIds.includes(q.id);
  const hasResult = doneIds[q.id];

  const imgHtml = q.images && q.images.length
    ? q.images.map(img => `<img loading="lazy" src="img/${img}" alt="" onclick="event.stopPropagation();openImgViewer('img/${img}')" onerror="this.style.display='none'">`).join('')
    : '<div style="color:var(--text3);font-size:14px">이미지 없음</div>';

  let koExtra = q.answer_ko || '';
  if (!koExtra && q.answer_text) {
    const parts = q.answer_text.split(',').map(s => s.trim());
    const translated = parts.map(p => TERMS[p] || '').filter(Boolean);
    if (translated.length) koExtra = translated.join(', ');
  }

  document.getElementById('chapterDetail').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="backToChapters()" style="margin-bottom:12px">&larr; 돌아가기</button>
    <div style="text-align:center;font-size:13px;color:var(--red);font-weight:700;margin-bottom:8px">&#128260; 오답 복습 모드</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--red)"></div></div>
    <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">${chapterQIdx+1} / ${total}</div>
    <div class="q-card card">
      <div class="q-card-inner">
      <div class="q-img-wrap">${imgHtml}</div>
      <div class="q-body">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div class="q-num">${q.year}년 #${q.question_num} [${q.category}]</div>
          <button class="star-btn ${isStar?'active':''}" onclick="toggleStar(${q.id});renderWrongReviewQuestion()">${isStar?'&#9733;':'&#9734;'}</button>
        </div>
        <div class="q-text">${q.question_text}</div>
        <div class="q-answer" id="wrAnswer_${q.id}">
          <div class="q-answer-en">${q.answer_text}</div>
          ${koExtra ? '<div class="q-answer-ko">' + koExtra + '</div>' : ''}
        </div>
        <button class="btn btn-primary btn-block" id="wrShowBtn_${q.id}" onclick="document.getElementById('wrAnswer_${q.id}').classList.add('show');document.getElementById('wrEval_${q.id}').style.display='flex';this.style.display='none'">정답 보기</button>
        <div class="btn-row" id="wrEval_${q.id}" style="display:none">
          <button class="btn btn-green" onclick="evalWrongReview(${q.id},'O')">&#9898; 맞았다</button>
          <button class="btn btn-red" onclick="evalWrongReview(${q.id},'X')">&#10060; 틀렸다</button>
        </div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-outline btn-sm" onclick="chapterQIdx=Math.max(0,chapterQIdx-1);renderWrongReviewQuestion()" ${chapterQIdx===0?'disabled':''}>&larr; 이전</button>
          <button class="btn btn-outline btn-sm" onclick="chapterQIdx=Math.min(chapterQuestions.length-1,chapterQIdx+1);renderWrongReviewQuestion()" ${chapterQIdx>=total-1?'disabled':''}>다음 &rarr;</button>
        </div>
      </div>
      </div>
    </div>
  `;
}

function evalWrongReview(id, result) {
  doneIds[id] = result;
  setStore('done', doneIds);
  if (result === 'O') {
    wrongIds = wrongIds.filter(x => x !== id);
    setStore('wrong', wrongIds);
  }
  if (chapterQIdx >= chapterQuestions.length - 1) {
    const correct = chapterQuestions.filter(q => doneIds[q.id] === 'O').length;
    document.getElementById('wrongReviewArea').innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:48px;margin-bottom:16px">&#9989;</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">오답 복습 완료!</div>
        <div style="color:var(--text2);margin-bottom:16px">${chapterQuestions.length}문제 중 ${correct}문제 정답</div>
        <button class="btn btn-primary" onclick="switchTab(7)">내 기록으로</button>
      </div>`;
    return;
  }
  chapterQIdx++;
  renderWrongReviewQuestion();
  scrollTop();
}

function startWrongMiniExam() {
  const wqs = ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
  if (wqs.length < 5) return;
  // Set up mock exam with wrong questions
  switchTab(0);
  setTimeout(() => {
    mockActive = true;
    mockQuestions = shuffle([...wqs]).slice(0, 20);
    mockAnswers = new Array(mockQuestions.length).fill(null);
    mockIdx = 0;
    mockTimePerQ = 30;
    yearQuestions = mockQuestions;
    currentQIdx = 0;
    document.getElementById('timerBar').style.display = 'block';
    renderMockQuestion();
    startMockTimer();
  }, 200);
}


// === DOPAN QUIZ (도판 전용 퀴즈) ===
let dopanQuizCards = [];
let dopanQIdx = 0;
let dopanCatFilter = 'all';
let dopanMode = 'study'; // study | shuffle | test
let dopanTestScore = {correct: 0, wrong: 0};
let dopanDone = getStore('dopanDone', {}); // {cardId: 'O'|'X'}

function getDopanCategories() {
  const cats = new Set();
  dopanCards.forEach(c => { if (c.category) cats.add(c.category); });
  return [...cats].sort();
}

function buildDopanQuizCards() {
  let cards = [...dopanCards];
  if (dopanCatFilter !== 'all') cards = cards.filter(c => c.category === dopanCatFilter);
  if (dopanMode === 'shuffle' || dopanMode === 'test') cards = shuffle([...cards]);
  if (dopanMode === 'test') cards = cards.slice(0, Math.min(20, cards.length));
  return cards;
}

function setDopanMode(mode) {
  dopanMode = mode;
  dopanQIdx = 0;
  dopanTestScore = {correct: 0, wrong: 0};
  document.getElementById('dopanModeStudy').className = 'btn btn-sm ' + (mode === 'study' ? 'btn-primary' : 'btn-outline');
  document.getElementById('dopanModeShuffle').className = 'btn btn-sm ' + (mode === 'shuffle' ? 'btn-primary' : 'btn-outline');
  document.getElementById('dopanModeTest').className = 'btn btn-sm ' + (mode === 'test' ? 'btn-primary' : 'btn-outline');
  renderDopanQuiz();
}

function startDopanTest() {
  dopanMode = 'test';
  dopanQIdx = 0;
  dopanTestScore = {correct: 0, wrong: 0};
  document.getElementById('dopanModeStudy').className = 'btn btn-sm btn-outline';
  document.getElementById('dopanModeShuffle').className = 'btn btn-sm btn-outline';
  document.getElementById('dopanModeTest').className = 'btn btn-sm btn-primary';
  renderDopanQuiz();
}

function renderDopanQuiz() {
  dopanQuizCards = buildDopanQuizCards();
  const cats = getDopanCategories();

  let filterHtml = `<button class="filter-chip ${dopanCatFilter==='all'?'active':''}" onclick="dopanCatFilter='all';dopanQIdx=0;renderDopanQuiz()">전체 (${dopanCards.length})</button>`;
  cats.forEach(c => {
    const cnt = dopanCards.filter(d => d.category === c).length;
    filterHtml += `<button class="filter-chip ${dopanCatFilter===c?'active':''}" onclick="dopanCatFilter='${c}';dopanQIdx=0;renderDopanQuiz()">${c} (${cnt})</button>`;
  });
  document.getElementById('dopanQuizFilter').innerHTML = filterHtml;

  if (!dopanQuizCards.length) {
    document.getElementById('dopanQuizArea').innerHTML = '<div class="empty-state"><div class="empty-icon">&#128444;</div><div class="empty-text">해당 카테고리에 도판이 없습니다</div></div>';
    document.getElementById('dopanProgressText').textContent = '0 / 0';
    document.getElementById('dopanProgressBar').style.width = '0%';
    return;
  }

  if (dopanQIdx >= dopanQuizCards.length) dopanQIdx = 0;
  const total = dopanQuizCards.length;
  document.getElementById('dopanProgressText').textContent = (dopanQIdx + 1) + ' / ' + total;
  document.getElementById('dopanProgressBar').style.width = ((dopanQIdx + 1) / total * 100).toFixed(0) + '%';

  if (dopanMode === 'test') {
    document.getElementById('dopanScoreText').innerHTML = '<span style="color:var(--green)">O:' + dopanTestScore.correct + '</span> <span style="color:var(--red)">X:' + dopanTestScore.wrong + '</span>';
  } else {
    const catCards = dopanCatFilter === 'all' ? dopanCards : dopanCards.filter(c => c.category === dopanCatFilter);
    const done = catCards.filter(c => dopanDone[c.id]).length;
    const correct = catCards.filter(c => dopanDone[c.id] === 'O').length;
    document.getElementById('dopanScoreText').innerHTML = done > 0 ? '<span style="color:var(--text2)">' + correct + '/' + done + ' (' + Math.round(correct/done*100) + '%)</span>' : '';
  }

  renderDopanCard();
}

function renderDopanCard() {
  if (!dopanQuizCards.length) return;
  const q = dopanQuizCards[dopanQIdx];
  const total = dopanQuizCards.length;
  const isStar = starIds.includes(q.id);
  const prevResult = dopanDone[q.id];
  const imgSrc = q.dopan_img || '';
  let koText = q.answer_ko || '';
  if (!koText && q.answer_text) {
    const parts = q.answer_text.split(',').map(s => s.trim());
    const translated = parts.map(p => TERMS[p] || '').filter(Boolean);
    if (translated.length) koText = translated.join(', ');
  }

  document.getElementById('dopanQuizArea').innerHTML = `
    <div class="card q-card">
      <div class="q-card-inner">
        <div class="q-img-wrap" onclick="openImgViewer('${imgSrc}')">
          ${imgSrc ? '<img loading="eager" decoding="async" src="' + imgSrc + '" alt="도판" onerror="this.outerHTML=\'<div style=\\\'color:var(--text3);padding:40px\\\'>이미지 없음</div>\'">' : '<div style="color:var(--text3)">이미지 없음</div>'}
        </div>
        <div class="q-body">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="q-num">${q.category || '도판'} #${dopanQIdx + 1}</div>
            <button class="star-btn ${isStar?'active':''}" onclick="toggleStar(${q.id});renderDopanCard()">${isStar?'&#9733;':'&#9734;'}</button>
          </div>
          <div class="q-text" style="font-size:15px;font-weight:600;margin:8px 0">이 조직/구조물의 이름은?</div>
          <div class="q-answer" id="dopanAns_${q.id}">
            <div class="q-answer-en" style="font-size:18px">${q.answer_text || '정답 없음'}</div>
            ${koText ? '<div class="q-answer-ko">' + koText + '</div>' : ''}
            ${q.organ ? '<div style="font-size:12px;color:var(--text2);margin-top:4px">&#128205; ' + (q.organ_ko || q.organ) + '</div>' : ''}
          </div>
          <button class="btn btn-primary btn-block" id="dopanShowBtn" onclick="document.getElementById('dopanAns_${q.id}').classList.add('show');document.getElementById('dopanEval_${q.id}').style.display='flex';this.style.display='none'">
            정답 보기
          </button>
          <div class="btn-row" id="dopanEval_${q.id}" style="display:none">
            <button class="btn btn-green btn-sm" onclick="evalDopan(${q.id},'O')">&#9898; 맞았다</button>
            <button class="btn btn-red btn-sm" onclick="evalDopan(${q.id},'X')">&#10060; 틀렸다</button>
          </div>
          ${prevResult ? '<div style="text-align:center;margin-top:4px;font-size:12px;color:' + (prevResult==='O'?'var(--green)':'var(--red)') + '">이전: ' + prevResult + '</div>' : ''}
          <div class="btn-row" style="margin-top:8px">
            <button class="btn btn-outline btn-sm" onclick="dopanPrev()" ${dopanQIdx===0?'disabled':''}>&larr;</button>
            <button class="btn btn-outline btn-sm" onclick="dopanNext()" ${dopanQIdx>=total-1?'disabled':''}>다음 &rarr;</button>
          </div>
        </div>
      </div>
    </div>
  `;

  // Preload next
  if (dopanQIdx < dopanQuizCards.length - 1) {
    const nxt = dopanQuizCards[dopanQIdx + 1];
    if (nxt.dopan_img) { const p = new Image(); p.src = nxt.dopan_img; }
  }
}

function evalDopan(id, result) {
  dopanDone[id] = result;
  setStore('dopanDone', dopanDone);
  if (result === 'X' && !wrongIds.includes(id)) { wrongIds.push(id); setStore('wrong', wrongIds); }
  if (result === 'O') { wrongIds = wrongIds.filter(x => x !== id); setStore('wrong', wrongIds); }

  if (dopanMode === 'test') {
    if (result === 'O') dopanTestScore.correct++;
    else dopanTestScore.wrong++;
  }

  if (dopanQIdx >= dopanQuizCards.length - 1) {
    if (dopanMode === 'test') {
      const total = dopanQuizCards.length;
      const pct = Math.round(dopanTestScore.correct / total * 100);
      document.getElementById('dopanQuizArea').innerHTML = `
        <div class="card" style="text-align:center;padding:32px">
          <div style="font-size:48px;margin-bottom:16px">${pct >= 80 ? '&#127881;' : pct >= 60 ? '&#128170;' : '&#128556;'}</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:8px">도판 미니테스트 완료!</div>
          <div style="font-size:32px;font-weight:700;color:var(--accent);margin-bottom:8px">${pct}%</div>
          <div style="color:var(--text2);margin-bottom:16px">${total}문제 중 <span style="color:var(--green)">${dopanTestScore.correct}개 정답</span>, <span style="color:var(--red)">${dopanTestScore.wrong}개 오답</span></div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="startDopanTest()">다시 도전</button>
            <button class="btn btn-outline" onclick="setDopanMode('study')">공부모드로</button>
          </div>
        </div>`;
      document.getElementById('dopanProgressBar').style.width = '100%';
      document.getElementById('dopanScoreText').innerHTML = '<span style="color:var(--accent);font-weight:700">' + pct + '%</span>';
      return;
    }
    // Study/shuffle mode - show completion
    const catCards = dopanCatFilter === 'all' ? dopanCards : dopanCards.filter(c => c.category === dopanCatFilter);
    const correct = catCards.filter(c => dopanDone[c.id] === 'O').length;
    document.getElementById('dopanQuizArea').innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:48px;margin-bottom:16px">&#9989;</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">도판 학습 완료!</div>
        <div style="color:var(--text2);margin-bottom:16px">${catCards.length}장 중 ${correct}개 정답</div>
        <button class="btn btn-primary" onclick="dopanQIdx=0;renderDopanQuiz()">처음부터</button>
      </div>`;
    return;
  }
  dopanQIdx++;
  renderDopanQuiz();
  scrollTop();
}

function dopanNext() {
  if (dopanQIdx < dopanQuizCards.length - 1) { dopanQIdx++; renderDopanQuiz(); scrollTop(); }
}
function dopanPrev() {
  if (dopanQIdx > 0) { dopanQIdx--; renderDopanQuiz(); scrollTop(); }
}

// === FLASH CARDS (짤기) ===
let flashCards = [];
let flashIdx = 0;
let flashCatFilter = 'all';

// Build dopan cards from DOPAN_FILES
const dopanCards = DOPAN_FILES.map((fname, i) => ({
  id: 10000 + i,
  year: 0,
  question_num: 0,
  question_text: '도판 - 이 조직/구조물은?',
  answer_text: fname.replace('.jpg','').replace('.JPG','').replace(/ \(\d+\)/g,''),
  answer_ko: TERMS[fname.replace('.jpg','').replace('.JPG','').replace(/ \(\d+\)/g,'')] || '',
  images: [],
  dopan_img: 'img/dopan/' + fname,
  organ: '',
  organ_ko: '',
  magnification: '',
  category: getDopanCategory(fname),
  frequency: 0,
  tip: '',
  isDopan: true
}));

let flashStars = getStore('flashStars', []);
let flashShowStarsOnly = false;

function toggleFlashStar(id) {
  if (flashStars.includes(id)) flashStars = flashStars.filter(x => x !== id);
  else flashStars.push(id);
  setStore('flashStars', flashStars);
  renderFlashCard();
}

function buildFlashCards() {
  let cards = [
    ...ALL_QUESTIONS.filter(q => q.images && q.images.length > 0),
    ...dopanCards
  ];
  if (flashShowStarsOnly) {
    cards = cards.filter(q => flashStars.includes(q.id));
  }
  if (flashCatFilter !== 'all') {
    cards = cards.filter(q => q.category === flashCatFilter);
  }
  cards.sort((a, b) => (b.frequency || 0) - (a.frequency || 0));
  return cards;
}

function renderFlash() {
  flashCards = buildFlashCards();
  const allCards = [...ALL_QUESTIONS.filter(q => q.images && q.images.length > 0), ...dopanCards];
  const cats = ['all', ...new Set(allCards.map(q => q.category).filter(Boolean))];
  let filterHtml = `<button class="filter-chip ${flashShowStarsOnly?'':'active'}" onclick="flashShowStarsOnly=false;flashCatFilter='all';flashIdx=0;renderFlash()">전체</button>`;
  filterHtml += `<button class="filter-chip ${flashShowStarsOnly?'active':''}" onclick="flashShowStarsOnly=true;flashCatFilter='all';flashIdx=0;renderFlash()">⭐별표만</button>`;
  if (!flashShowStarsOnly) {
    filterHtml += cats.filter(c=>c!=='all').map(c =>
      `<button class="filter-chip ${flashCatFilter===c?'active':''}" onclick="flashShowStarsOnly=false;flashCatFilter='${c}';flashIdx=0;renderFlash()">${c}</button>`
    ).join('');
  }
  document.getElementById('flashCatFilter').innerHTML = filterHtml;
  document.getElementById('flashRemaining').textContent = flashCards.length;
  document.getElementById('flashProgressText').textContent = flashShowStarsOnly ? '별표 카드' : flashCards.length + '장';

  if (flashIdx >= flashCards.length) flashIdx = 0;
  if (!flashCards.length) {
    document.getElementById('flashArea').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${flashShowStarsOnly ? '⭐' : '&#127881;'}</div>
        <div class="empty-text">${flashShowStarsOnly ? '별표한 카드가 없습니다' : '카드가 없습니다'}</div>
      </div>
    `;
    document.getElementById('flashProgressBar').style.width = '0%';
    return;
  }
  const pct = ((flashIdx + 1) / flashCards.length * 100).toFixed(0);
  document.getElementById('flashProgressBar').style.width = pct + '%';
  renderFlashCard();
}

function renderFlashCard() {
  if (!flashCards.length) { renderFlash(); return; }
  const q = flashCards[flashIdx];
  const isStarred = flashStars.includes(q.id);
  let imgSrc = '';
  if (q.isDopan && q.dopan_img) {
    imgSrc = q.dopan_img;
  } else if (q.images && q.images.length) {
    imgSrc = 'img/' + q.images[0];
  }
  let koExtra = q.answer_ko || '';
  if (!koExtra && q.answer_text) {
    const parts = q.answer_text.split(',').map(s => s.trim());
    const translated = parts.map(p => TERMS[p] || '').filter(Boolean);
    if (translated.length) koExtra = translated.join(', ');
  }
  const freq = q.frequency || 0;
  let organInfo = q.organ_ko || q.organ || '';

  document.getElementById('flashArea').innerHTML = `
    <div class="flash-card" id="flashCardEl" onclick="this.classList.toggle('flipped')">
      <div class="flash-card-inner">
        <div class="flash-card-front">
          ${imgSrc ? `<img loading="eager" decoding="async" src="${imgSrc}" alt="조직 사진" onerror="this.outerHTML='<div style=\\'color:var(--text3);padding:40px\\'>이미지 없음</div>'">` : '<div style="color:var(--text3)">이미지 없음</div>'}
        </div>
        <div class="flash-card-back">
          <div class="flash-answer-en">${q.answer_text || '정답 없음'}</div>
          ${koExtra ? `<div class="flash-answer-ko">${koExtra}</div>` : ''}
          ${organInfo ? `<div class="flash-organ">📍 ${organInfo}</div>` : ''}
          ${freq > 1 ? `<div class="flash-freq">🔥 ${freq}회 출제</div>` : ''}
          ${q.isDopan ? '<div style="font-size:12px;color:var(--text3);margin-top:6px">📋 도판</div>' : ''}
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 4px">
      <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();flashPrev()">←</button>
      <span style="font-size:13px;color:var(--text2)">${flashIdx+1} / ${flashCards.length}</span>
      <button class="star-btn ${isStarred?'active':''}" onclick="event.stopPropagation();toggleFlashStar(${q.id})" style="font-size:28px">
        ${isStarred ? '⭐' : '☆'}
      </button>
      <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();flashNext()">→</button>
    </div>
  `;
  // Swipe
  const el = document.getElementById('flashCardEl');
  if (el) {
    let sx = 0, sy = 0;
    el.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive: true});
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        if (dx < 0) flashNext();
        else flashPrev();
      }
    }, {passive: true});
  }
  // Preload next flash card image
  if (flashIdx < flashCards.length - 1) {
    const nxt = flashCards[flashIdx + 1];
    let nxtSrc = nxt.isDopan && nxt.dopan_img ? nxt.dopan_img : (nxt.images && nxt.images.length ? 'img/' + nxt.images[0] : '');
    if (nxtSrc) { const p = new Image(); p.src = nxtSrc; }
  }
}

function flashNext() {
  if (flashIdx < flashCards.length - 1) { flashIdx++; renderFlashCard(); scrollTop(); }
}
function flashPrev() {
  if (flashIdx > 0) { flashIdx--; renderFlashCard(); scrollTop(); }
}

// Background pre-cache all images (runs quietly after page load)
setTimeout(function() {
  const allImgUrls = [];
  // Collect all question images
  ALL_QUESTIONS.forEach(function(q) {
    if (q.images) q.images.forEach(function(img) { allImgUrls.push('img/' + img); });
  });
  // Collect all dopan images
  if (typeof DOPAN_FILES !== 'undefined') {
    DOPAN_FILES.forEach(function(f) { allImgUrls.push('img/dopan/' + f); });
  }
  // Deduplicate
  const unique = [...new Set(allImgUrls)];
  let loaded = 0;
  const batch = 6; // concurrent downloads
  function loadNext() {
    const urls = unique.splice(0, batch);
    if (!urls.length) return;
    urls.forEach(function(url) {
      const img = new Image();
      img.onload = img.onerror = function() {
        loaded++;
        if (unique.length) loadNext();
      };
      img.src = url;
    });
  }
  // Start pre-caching with low priority
  if (navigator.connection && navigator.connection.saveData) return; // respect data saver
  loadNext();
}, 3000); // wait 3s after page load
</script>
