<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>학습 앱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:400px;width:90%;text-align:center}
h1{font-size:24px;margin-bottom:24px;color:#1a1a2e}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-decoration:none;color:#1a1a2e;display:block;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-icon{font-size:48px;margin-bottom:12px}
.card-title{font-size:18px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
<h1>📚 학습 앱</h1>
<a class="card" href="histo/">
<div class="card-icon">🔬</div>
<div class="card-title">조직학 땡시험</div>
<div class="card-desc">기출 465문제 + 도판 277장 + 꿀팁</div>
</a>
<a class="card" href="anatomy/">
<div class="card-icon">🦴</div>
<div class="card-title">인체의 구조</div>
<div class="card-desc">해부학 기출 + 강의자료 + 조직땡</div>
</a>
</div>
</body>
</html>
